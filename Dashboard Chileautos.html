urn false;\n    if(dbFiltroSel){\n      if((r[1]||'—')!==dbFiltroSel.gen) return false;\n      if(dbFiltroSel.campo===4 && r[4]!==dbFiltroSel.val) return false;\n      if(dbFiltroSel.campo===3 && ((r[3]||'(sin texto)')!==dbFiltroSel.val || r[4])) return false;\n    }\n    if(q && !((r[3]||'')+' '+(r[4]||'')+' '+(r[11]||'')).toLowerCase().includes(q)) return false;\n    return true;\n  });\n  const specCols = dbVerFicha ? [...new Set(rows.slice(0,500).flatMap(r=>Object.keys(FICHAS[r[0]]||{})))].sort() : [];\n  const tot=rows.length, LIM=500;\n  document.getElementById('db-info').textContent=\n    tot>LIM?`mostrando ${LIM} de ${tot} — afiná con los filtros de gen o el buscador`:`${tot} avisos`;\n  rows=rows.slice(0,LIM);\n  cont.innerHTML=`<table style=\"width:100%;border-collapse:collapse;font-size:12px\">\n    <thead><tr style=\"text-align:left;color:var(--muted);font-size:11px;position:sticky;top:0;background:var(--panel)\">\n      <th style=\"padding:5px 8px\">Gen<\u002Fth><th style=\"padding:5px 8px\">Año<\u002Fth>\n      <th style=\"padding:5px 8px\">Versión (vendedor)<\u002Fth><th style=\"padding:5px 8px\">Versión ajustada<\u002Fth>\n      ${specCols.map(c=>`<th style=\"padding:5px 8px;white-space:nowrap\">${c}<\u002Fth>`).join(\"\")}\n      <th style=\"padding:5px 8px\" class=\"num\">Km<\u002Fth><th style=\"padding:5px 8px\" class=\"num\">Precio<\u002Fth>\n      <th style=\"padding:5px 8px\" title=\"Lo que el sistema extrajo del comentario (clasificación automática)\">Estado (procesado)<\u002Fth>\n      <th style=\"padding:5px 8px\">Comentario del vendedor<\u002Fth><th style=\"padding:5px 8px\">Aviso<\u002Fth><\u002Ftr><\u002Fthead>\n    <tbody>${rows.map(r=>`\n      <tr style=\"border-top:1px solid var(--line)\">\n        <td style=\"padding:4px 8px;white-space:nowrap\">${r[1]||'—'}<\u002Ftd>\n        <td style=\"padding:4px 8px\">${r[2]||''}<\u002Ftd>\n        <td style=\"padding:4px 8px;color:var(--muted)\" title=\"${esc(r[3])}\">${esc(r[3])||'—'}<\u002Ftd>\n        <td style=\"padding:4px 8px;color:var(--signal,#3b82f6)\">${FICHAS[r[0]]?`<button title=\"Ver ficha técnica completa\" onclick=\"verFicha('${r[0]}')\" style=\"border:none;background:none;cursor:pointer\">ficha<\u002Fbutton> `:''}${esc(r[4])||'—'}\n          <button title=\"Corregir versión de este aviso\" style=\"border:none;background:none;cursor:pointer\" onclick=\"corregirVersion('${r[0]}','${(r[3]||'').replace(/'/g,'')}',this)\">editar<\u002Fbutton><\u002Ftd>\n        ${specCols.map(c=>`<td style=\"padding:4px 8px;white-space:nowrap;font-size:11px\">${(FICHAS[r[0]]||{})[c]||\"\"}<\u002Ftd>`).join(\"\")}\n        <td style=\"padding:4px 8px\" class=\"num\">${r[5]?f0(r[5]*1000):'—'}<\u002Ftd>\n        <td style=\"padding:4px 8px\" class=\"num\">${r[6]?fM(r[6]):'—'}<\u002Ftd>\n        <td style=\"padding:4px 8px;max-width:180px;font-size:11px;color:var(--signal,#3b82f6)\" title=\"${esc(r[12])}\">${esc(r[12])||'—'}<\u002Ftd>\n        <td style=\"padding:4px 8px;max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--muted)\" title=\"${esc(r[11])}\">${esc(r[11])}<\u002Ftd>\n        <td style=\"padding:4px 8px;white-space:nowrap\">${r[13]?`<a class=\"link-btn\" target=\"_blank\" rel=\"noopener\" href=\"${r[13]}\" style=\"color:var(--signal,#3b82f6);text-decoration:underline;cursor:pointer\">ver<\u002Fa>`:'<span title=\"Sin link: regenerá con el último motor.py\">—<\u002Fspan>'}<\u002Ftd>\n      <\u002Ftr>`).join('')}<\u002Ftbody><\u002Ftable>`;\n}\n// ===== Análisis BI (Fase 1) =====\nlet BIDATA=null;\nfunction biData(){\n  if(BIDATA) return BIDATA;\n  BIDATA=[];\n  for(const k in DEPU){\n    const [ma,mo]=k.split('|');\n    for(const r of DEPU[k]){\n      BIDATA.push({ma,mo,gen:r[1]||'—',anio:r[2]||0,ver:(r[4]||'—').replace('≈ ',''),\n        km:(r[5]||0)*1000,precio:r[6]||0,vend:r[14]||'—',dias:(typeof r[15]==='number'?r[15]:-1),\n        desc:(typeof r[16]==='number'?r[16]:null),url:r[13]||'',seg:(r[17]||'')});\n    }\n  }\n  return BIDATA;\n}\nfunction biInit(){\n  // absorber la vieja pestaña de rotación como widget del BI (render intacto)\n  const rot=document.getElementById('rotacion'), wrap=document.getElementById('bi-rotwrap');\n  if(rot && wrap && rot.parentElement!==wrap){\n    rot.classList.remove('view'); rot.style.display='block'; wrap.appendChild(rot);\n  }\n  const sel=document.getElementById('bi-marca'); if(!sel||sel.options.length>1) return;\n  const marcas=[...new Set(biData().map(x=>x.ma))].sort();\n  sel.innerHTML='<option value=\"\">todas<\u002Foption>'+marcas.map(m=>`<option>${m}<\u002Foption>`).join('');\n  const segs=[...new Set(biData().map(x=>x.seg).filter(Boolean))].sort();\n  document.getElementById('bi-seg').innerHTML='<option value=\"\">todos<\u002Foption>'+segs.map(s=>`<option>${s}<\u002Foption>`).join('');\n  biRender();\n}\nwindow.biMarca=function(){\n  const ma=document.getElementById('bi-marca').value;\n  const mods=[...new Set(biData().filter(x=>!ma||x.ma===ma).map(x=>x.mo))].sort();\n  document.getElementById('bi-modelo').innerHTML='<option value=\"\">todos<\u002Foption>'+mods.map(m=>`<option>${m}<\u002Foption>`).join('');\n  biGens(); biRender();\n};\nwindow.biGens=function(){\n  const ma=document.getElementById('bi-marca').value, mo=document.getElementById('bi-modelo').value;\n  const gens=[...new Set(biData().filter(x=>(!ma||x.ma===ma)&&(!mo||x.mo===mo)).map(x=>x.gen))].sort();\n  document.getElementById('bi-gen').innerHTML='<option value=\"\">todas<\u002Foption>'+gens.map(g=>`<option>${g}<\u002Foption>`).join('');\n};\nwindow.biLimpiar=function(){\n  ['bi-marca','bi-modelo','bi-gen','bi-vend'].forEach(id=>document.getElementById(id).value='');\n  ['bi-a0','bi-a1','bi-p0','bi-p1'].forEach(id=>document.getElementById(id).value='');\n  biMarca();\n};\nfunction biFiltrado(){\n  const ma=document.getElementById('bi-marca').value, mo=document.getElementById('bi-modelo').value;\n  const ge=document.getElementById('bi-gen').value, ve=document.getElementById('bi-vend').value;\n  const a0=+document.getElementById('bi-a0').value||0, a1=+document.getElementById('bi-a1').value||9999;\n  const p0=(+document.getElementById('bi-p0').value||0)*1e6, p1=(+document.getElementById('bi-p1').value||1e6)*1e6;\n  const sg=document.getElementById('bi-seg')?document.getElementById('bi-seg').value:'';\n  return biData().filter(x=>(!ma||x.ma===ma)&&(!mo||x.mo===mo)&&(!ge||x.gen===ge)&&(!ve||x.vend===ve)\n    &&(!sg||x.seg===sg)&&x.anio>=a0&&x.anio<=a1&&x.precio>=p0&&x.precio<=p1);\n}\nfunction biMediana(a){if(!a.length)return 0;const s=[...a].sort((x,y)=>x-y);return s[Math.floor(s.length/2)];}\nfunction biBarras(cont, pares, fmt){\n  const max=Math.max(...pares.map(p=>p[1]),1);\n  cont.innerHTML=pares.map(([lab,val])=>`\n    <div style=\"display:flex;align-items:center;gap:8px;margin:2px 0;font-size:11px\">\n      <div style=\"min-width:86px;text-align:right;color:var(--muted)\">${lab}<\u002Fdiv>\n      <div style=\"flex:1;background:var(--line);border-radius:4px;height:14px;position:relative\">\n        <div style=\"width:${Math.round(val*100/max)}%;background:var(--signal,#3b82f6);height:14px;border-radius:4px\"><\u002Fdiv><\u002Fdiv>\n      <div style=\"min-width:70px\">${fmt?fmt(val):val.toLocaleString('es-CL')}<\u002Fdiv><\u002Fdiv>`).join('');\n}\nwindow.biRender=function(){\n  const cont=document.getElementById('bi-kpis'); if(!cont) return;\n  const D=biFiltrado();\n  const precios=D.map(x=>x.precio).filter(Boolean);\n  const dias=D.map(x=>x.dias).filter(d=>d>=0);\n  const total=precios.reduce((a,b)=>a+b,0);\n  const kpi=(lab,val,sub)=>`<div style=\"background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px 14px\">\n    <div style=\"font-size:10px;letter-spacing:.05em;color:var(--muted);text-transform:uppercase\">${lab}<\u002Fdiv>\n    <div style=\"font-size:22px;font-weight:700\">${val}<\u002Fdiv>${sub?`<div style=\"font-size:10px;color:var(--muted)\">${sub}<\u002Fdiv>`:''}<\u002Fdiv>`;\n  cont.innerHTML=\n    kpi('Avisos', D.length.toLocaleString('es-CL'))+\n    kpi('Precio mediano', precios.length?fM(biMediana(precios)):'—')+\n    kpi('Valor del segmento', total?('$'+(total/1e9).toFixed(1)+' mil M'):'—','suma de precios pedidos')+\n    kpi('Días en mercado', dias.length?biMediana(dias)+' d':'—','mediana desde detección')+\n    kpi('Con generación', D.length?Math.round(D.filter(x=>x.gen!=='—').length*100/D.length)+'%':'—')+\n    (()=>{const hoy=new Date().getFullYear();\n      const kma=D.filter(x=>x.km&&x.anio&&hoy-x.anio>=1).map(x=>Math.round(x.km/(hoy-x.anio)));\n      return kpi('Km/año del parque', kma.length?f0(biMediana(kma)):'—','intensidad de uso (mediana)');})();\n  // distribución por año\n  const porAnio={};\n  D.forEach(x=>{if(x.anio)porAnio[x.anio]=(porAnio[x.anio]||0)+1;});\n  const anios=Object.entries(porAnio).sort((a,b)=>b[0]-a[0]).slice(0,18);\n  const medAnio={};\n  anios.forEach(([a])=>{medAnio[a]=biMediana(D.filter(x=>x.anio==a&&x.precio).map(x=>x.precio));});\n  const maxN=Math.max(...anios.map(p=>p[1]),1);\n  const totAn=anios.reduce((s,p)=>s+p[1],0)||1;\n  document.getElementById('bi-anios').innerHTML=\n    `<div style=\"display:flex;gap:8px;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px\">\n      <div style=\"min-width:40px;text-align:right\">Año<\u002Fdiv><div style=\"flex:1\"><\u002Fdiv>\n      <div style=\"min-width:56px\">Avisos<\u002Fdiv><div style=\"min-width:36px\">%<\u002Fdiv>\n      <div style=\"min-width:84px\">Precio med.<\u002Fdiv><\u002Fdiv>`\n    +anios.map(([a,n])=>`\n    <div style=\"display:flex;align-items:center;gap:8px;margin:2px 0;font-size:11px\">\n      <div style=\"min-width:40px;text-align:right;color:var(--muted)\">${a}<\u002Fdiv>\n      <div style=\"flex:1;background:var(--line);border-radius:4px;height:14px\"><div style=\"width:${Math.round(n*100/maxN)}%;background:var(--signal,#3b82f6);height:14px;border-radius:4px\"><\u002Fdiv><\u002Fdiv>\n      <div style=\"min-width:56px\">${n.toLocaleString('es-CL')}<\u002Fdiv>\n      <div style=\"min-width:36px;color:var(--muted)\">${Math.round(n*100/totAn)}%<\u002Fdiv>\n      <div style=\"min-width:84px;color:var(--muted)\" title=\"precio mediano del año (curva de depreciación)\">${medAnio[a]?fM(medAnio[a]):''}<\u002Fdiv><\u002Fdiv>`).join('');\n  // antigüedad\n  const cortes=[['0-7 d',0,7],['8-15 d',8,15],['16-30 d',16,30],['31-60 d',31,60],['61+ d',61,1e9]];\n  biBarras(document.getElementById('bi-antig'),\n    cortes.map(([lab,d0,d1])=>[lab, dias.filter(d=>d>=d0&&d<=d1).length]));\n  // composición técnica: combustible / tracción / caja son dimensiones\n  // INDEPENDIENTES — cada bloque suma su propio 100%\n  (function(){\n    const bloque=(titulo,labs,mayus)=>{\n      const filas=labs.map(l=>[l, D.filter(x=>x.ver.includes(l)).length]).filter(p=>p[1]);\n      const tot=filas.reduce((s,p)=>s+p[1],0)||1;\n      if(!filas.length) return '';\n      const max=Math.max(...filas.map(p=>p[1]),1);\n      return `<div style=\"font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin:8px 0 3px\">${titulo}<\u002Fdiv>`\n        +filas.map(([lab,n])=>`\n        <div style=\"display:flex;align-items:center;gap:8px;margin:2px 0;font-size:11px\">\n          <div style=\"min-width:70px;text-align:right;color:var(--muted)\">${mayus?lab.trim().toUpperCase():lab}<\u002Fdiv>\n          <div style=\"flex:1;background:var(--line);border-radius:4px;height:12px\"><div style=\"width:${Math.round(n*100/max)}%;background:var(--signal,#3b82f6);height:12px;border-radius:4px\"><\u002Fdiv><\u002Fdiv>\n          <div style=\"min-width:60px\">${n.toLocaleString('es-CL')}<\u002Fdiv>\n          <div style=\"min-width:34px;color:var(--muted)\">${Math.round(n*100/tot)}%<\u002Fdiv><\u002Fdiv>`).join('');\n    };\n    document.getElementById('bi-comp').innerHTML=\n      bloque('Combustible',['diesel','bencina','hibrido','gas'],false)\n      +bloque('Tracción',['4x4','4x2'],false)\n      +bloque('Caja',[' at',' mt'],true);\n  })();\n  // bajas de precio de la última comparación (filtradas por marca/modelo)\n  (function(){\n    const cont=document.getElementById('bi-bajas'); if(!cont) return;\n    const R=(DATA.rotacion||{});\n    let bajas=R.bajas_precio||[];\n    const fMa=document.getElementById('bi-marca').value.toLowerCase();\n    const fMo=document.getElementById('bi-modelo').value.toLowerCase();\n    if(fMa) bajas=bajas.filter(x=>(x.marca||'').toLowerCase()===fMa);\n    if(fMo) bajas=bajas.filter(x=>(x.modelo||'').toLowerCase()===fMo);\n    if(!bajas.length){cont.innerHTML='<span style=\"color:var(--muted);font-size:12px\">Sin bajas registradas en la última comparación (o sin datos de rotación aún: requiere dos capturas completas).<\u002Fspan>';return;}\n    // bajas >50% suelen ser corrección de un precio mal tipeado, no oferta\n    const reales=bajas.filter(x=>x.pct==null||x.pct>-50).sort((a,b)=>(a.pct??0)-(b.pct??0));\n    const sospechosas=bajas.filter(x=>x.pct!=null&&x.pct<=-50);\n    bajas=[...reales,...sospechosas];\n    cont.innerHTML=`<table style=\"width:100%;border-collapse:collapse;font-size:11px\"><tbody>${bajas.slice(0,40).map(x=>`\n      <tr style=\"border-top:1px solid var(--line)${(x.pct!=null&&x.pct<=-50)?';opacity:.55':''}\">\n        <td style=\"padding:3px 6px\">${x.marca} ${x.modelo}${x.año?' '+x.año:''}${(x.pct!=null&&x.pct<=-50)?' <span style=\"font-size:10px;color:var(--muted)\">(corrección de precio errado?)<\u002Fspan>':''}<\u002Ftd>\n        <td style=\"padding:3px 6px\" class=\"num\" style=\"color:var(--muted)\">${fM(x.antes)}<\u002Ftd>\n        <td style=\"padding:3px 6px\" class=\"num\"><b>${fM(x.ahora)}<\u002Fb><\u002Ftd>\n        <td style=\"padding:3px 6px\" class=\"num\" style=\"color:var(--good,#16a34a)\">${x.pct!=null?x.pct+'%':''}<\u002Ftd>\n        <td style=\"padding:3px 6px\">${x.url?`<a target=\"_blank\" rel=\"noopener\" href=\"${x.url}\" style=\"color:var(--signal,#3b82f6)\">ver<\u002Fa>`:''}<\u002Ftd>\n      <\u002Ftr>`).join('')}<\u002Ftbody><\u002Ftable>`;\n  })();\n  // canales: share + prima del canal formal\n  const nPart=D.filter(x=>x.vend==='Particular').length;\n  const nAuto=D.filter(x=>x.vend==='Automotora').length;\n  const pPart=biMediana(D.filter(x=>x.vend==='Particular'&&x.precio).map(x=>x.precio));\n  const pAuto=biMediana(D.filter(x=>x.vend==='Automotora'&&x.precio).map(x=>x.precio));\n  const prima=(pPart&&pAuto)?Math.round((pAuto-pPart)*100/pPart):null;\n  const totC=nPart+nAuto;\n  document.getElementById('bi-canales').innerHTML=totC?`\n    <div style=\"font-size:12px;line-height:2\">\n      Particular: <b>${nPart.toLocaleString('es-CL')}<\u002Fb> avisos (${Math.round(nPart*100/totC)}%) · mediana ${pPart?fM(pPart):'—'}<br>\n      Automotora: <b>${nAuto.toLocaleString('es-CL')}<\u002Fb> avisos (${Math.round(nAuto*100/totC)}%) · mediana ${pAuto?fM(pAuto):'—'}<br>\n      ${prima!==null?`Prima del canal formal: <b>${prima>0?'+':''}${prima}%<\u002Fb>`:''}\n    <\u002Fdiv>`:'<span style=\"color:var(--muted);font-size:12px\">sin datos de canal en el segmento<\u002Fspan>';\n  // cruce rápido\n  const dim=document.getElementById('bi-dim').value, met=document.getElementById('bi-met').value;\n  const grupos={};\n  D.forEach(x=>{const k=x[dim]||'—';(grupos[k]=grupos[k]||[]).push(x);});\n  let filas=Object.entries(grupos).map(([k,arr])=>{\n    let v;\n    if(met==='n')v=arr.length;\n    else if(met==='pmed')v=biMediana(arr.map(x=>x.precio).filter(Boolean));\n    else if(met==='kmed')v=biMediana(arr.map(x=>x.km).filter(Boolean));\n    else v=biMediana(arr.map(x=>x.dias).filter(d=>d>=0));\n    return [k,v,arr.length];\n  }).sort((a,b)=>b[1]-a[1]).slice(0,40);\n  const totCruce=D.length||1;\n  const fmt=met==='pmed'?fM:(met==='kmed'?(v=>f0(v)):(v=>v.toLocaleString('es-CL')+(met==='dmed'?' d':'')));\n  document.getElementById('bi-cruce').innerHTML=`<table style=\"width:100%;border-collapse:collapse;font-size:11px\">\n    <tbody>${filas.map(([k,v,n])=>`<tr style=\"border-top:1px solid var(--line)\">\n      <td style=\"padding:3px 8px\">${k}<\u002Ftd>\n      <td style=\"padding:3px 8px\" class=\"num\"><b>${fmt(v)}<\u002Fb><\u002Ftd>\n      <td style=\"padding:3px 8px;color:var(--muted)\" class=\"num\">${n} av. · ${Math.round(n*100/totCruce)}%<\u002Ftd><\u002Ftr>`).join('')}<\u002Ftbody><\u002Ftable>`;\n};\n// inicializar al entrar a la pestaña\ndocument.querySelectorAll('.tab').forEach(b=>{\n  if(b.dataset.view==='bi') b.addEventListener('click',()=>setTimeout(biInit,50));\n});\n\ndbInit();\n\ngmInit();\n\nvmInit();\n\nconst depCambios = {};\nfunction renderDepuracion(){\n  const cuerpo=document.getElementById('dep-body'); if(!cuerpo) return;\n  const dep=DATA.depuracion||[];\n  const q=(document.getElementById('dep-buscar').value||'').toLowerCase().trim();\n  const f=document.getElementById('dep-filtro').value;\n  let filas=dep.filter(d=>{\n    if(q && !((d.marca+' '+d.modelo).toLowerCase().includes(q))) return false;\n    if(f==='sin' && d.firma) return false;\n    if(f==='pend' && d.canonica) return false;\n    if(f==='rev' && !d.revisar) return false;\n    return true;\n  }).slice(0,400);\n  cuerpo.innerHTML=filas.map(d=>`\n    <tr${d.firma?'':' style=\"opacity:.75\"'}>\n      <td><b>${d.marca} ${d.modelo}<\u002Fb>${d.revisar?' <span title=\"Precios demasiado dispersos dentro del mismo año: probablemente conviven versiones distintas bajo esta firma\" style=\"cursor:help\">(!)<\u002Fspan>':''}<\u002Ftd>\n      <td>${d.gen||'—'}<\u002Ftd>\n      <td class=\"mono\" title=\"Texto vendedor: ${(d.ejemplos||'—').replace(/\"/g,'&quot;')}${d.specs?'&#10;Versión OFICIAL (specs): '+d.specs.replace(/\"/g,'&quot;'):''}\">${d.firma||'(sin firma)'}${d.specs?' 📋':''} <span style=\"color:var(--muted);cursor:help\">ⓘ<\u002Fspan><\u002Ftd>\n      <td class=\"num\">${f0(d.avisos)}<\u002Ftd>\n      <td class=\"num\">${fM(d.precio_mediano)}<\u002Ftd>\n      <td>${d.años}<\u002Ftd>\n      <td><input type=\"text\" data-clave=\"${d.clave}\" class=\"dep-in\" value=\"${(d.canonica||d.sugerida||'').replace(/\"/g,'&quot;')}\"\n           style=\"width:100%;padding:5px;border:1px solid var(--line);border-radius:6px;font-size:12px;background:var(--panel)\"\n           onchange=\"depCambios[this.dataset.clave]=depCambios[this.dataset.clave]||{};depCambios[this.dataset.clave].canonica=this.value\">${d.precal?`\n        <div style=\"margin-top:4px;font-size:11px;color:${d.precal.conf==='alta'?'var(--good,#3a9d5d)':'var(--muted)'}\">\n          🎯 ${d.precal.version.replace(/<\u002Fg,'&lt;')}\n          <span style=\"color:var(--muted)\">(${d.precal.conf}: ${d.precal.senales})<\u002Fspan>\n          <button class=\"comp-btn\" style=\"font-size:10px;padding:1px 6px\" title=\"Usar esta versión como canónica\"\n            onclick=\"usarPrecal('${d.clave}', this)\">Usar<\u002Fbutton>\n        <\u002Fdiv>`:''}<\u002Ftd>\n      <td style=\"text-align:center\"><input type=\"checkbox\" data-clave=\"${d.clave}\" ${d.excluir?'checked':''}\n           onchange=\"depCambios[this.dataset.clave]=depCambios[this.dataset.clave]||{};depCambios[this.dataset.clave].excluir=this.checked\"><\u002Ftd>\n    <\u002Ftr>`).join('');\n  document.getElementById('dep-nota').textContent = dep.length\n    ? `${dep.length} combinaciones con 3+ avisos (mostrando ${filas.length}). ⓘ = pasá el mouse por la firma para ver el texto real del vendedor.`\n    : 'Todavía no hay sugerencias: se generan en el próximo recálculo del motor.';\n}\nconst TAS = (DATA.tasador||[]);\nfunction tsInit(){\n  const mas=[...new Set(TAS.map(x=>x.ma))].sort();\n  document.getElementById('ts-ma').innerHTML='<option value=\"\">—<\u002Foption>'+mas.map(m=>`<option>${m}<\u002Foption>`).join('');\n}\nfunction tsMarca(){\n  const ma=document.getElementById('ts-ma').value;\n  const mos=[...new Set(TAS.filter(x=>x.ma===ma).map(x=>x.mo))].sort();\n  document.getElementById('ts-mo').innerHTML='<option value=\"\">—<\u002Foption>'+mos.map(m=>`<option>${m}<\u002Foption>`).join('');\n  document.getElementById('ts-ver').innerHTML='';document.getElementById('ts-año').innerHTML='';\n}\nfunction tsModelo(){\n  const ma=document.getElementById('ts-ma').value, mo=document.getElementById('ts-mo').value;\n  const del=TAS.filter(x=>x.ma===ma&&x.mo===mo&&x.nivel!=='modelo');\n  const vers={};\n  del.forEach(x=>{const k=x.nivel+'§'+x.gen+'§'+x.ver; vers[k]=(vers[k]||0)+x.n;});\n  const ops=Object.entries(vers).sort((a,b)=>b[1]-a[1]).map(([k,n])=>{\n    const [niv,gen,ver]=k.split('§');\n    const tag=niv==='oficial'?'📋 ':'';\n    return `<option value=\"${k.replace(/\"/g,'&quot;')}\">${tag}${ver}${gen&&gen!=='nan'?' ['+gen+']':''} (${n})<\u002Foption>`;});\n  document.getElementById('ts-ver').innerHTML='<option value=\"\">— solo modelo —<\u002Foption>'+ops.join('');\n  tsVersion();\n}\nfunction tsVersion(){\n  const ma=document.getElementById('ts-ma').value, mo=document.getElementById('ts-mo').value;\n  const vsel=document.getElementById('ts-ver').value;\n  let filas;\n  if(vsel){const [niv,gen,ver]=vsel.split('§');\n    filas=TAS.filter(x=>x.ma===ma&&x.mo===mo&&x.nivel===niv&&String(x.gen)===gen&&x.ver===ver);}\n  else filas=TAS.filter(x=>x.ma===ma&&x.mo===mo&&x.nivel==='modelo');\n  const años=[...new Set(filas.map(x=>x.año))].sort((a,b)=>b-a);\n  document.getElementById('ts-año').innerHTML=años.map(a=>`<option>${a}<\u002Foption>`).join('');\n}\nfunction tsTasar(){\n  const ma=document.getElementById('ts-ma').value, mo=document.getElementById('ts-mo').value;\n  const vsel=document.getElementById('ts-ver').value;\n  const año=parseInt(document.getElementById('ts-año').value);\n  const km=parseInt(document.getElementById('ts-km').value)||0;\n  const out=document.getElementById('ts-out');\n  if(!ma||!mo||!año){out.innerHTML='<p class=\"lead\">Elegí al menos marca, modelo y año.<\u002Fp>';return;}\n  let fila=null, nivelTxt='';\n  if(vsel){const [niv,gen,ver]=vsel.split('§');\n    fila=TAS.find(x=>x.ma===ma&&x.mo===mo&&x.nivel===niv&&String(x.gen)===gen&&x.ver===ver&&x.año===año);\n    nivelTxt=niv==='oficial'?'versión OFICIAL (ficha técnica)':'versión del texto de avisos';}\n  if(!fila){fila=TAS.find(x=>x.ma===ma&&x.mo===mo&&x.nivel==='modelo'&&x.año===año);\n    if(fila&&!nivelTxt)nivelTxt='modelo completo (sin distinguir versión)';\n    else if(fila&&vsel)nivelTxt+=' — sin datos de ese año en la versión, tasado a nivel modelo';}\n  if(!fila){out.innerHTML='<p class=\"lead\">Sin datos suficientes para esa combinación. Probá otro año o solo el modelo.<\u002Fp>';return;}\n  let kmNota='';\n  if(km&&fila.km50){\n    const d=(km-fila.km50)/fila.km50;\n    if(d>0.25)kmNota=`(!) Tu km (${f0(km)}) está ${Math.round(d*100)}% sobre la mediana del grupo (${f0(fila.km50)}): apuntá al rango bajo o menos.`;\n    else if(d<-0.25)kmNota=`✓ Tu km (${f0(km)}) está ${Math.round(-d*100)}% bajo la mediana (${f0(fila.km50)}): puede justificar el rango alto.`;\n    else kmNota=`Km en línea con la mediana del grupo (${f0(fila.km50)}).`;\n  }\n  out.innerHTML=`<div class=\"card\" style=\"max-width:560px;padding:18px\">\n    <div style=\"font-size:13px;color:var(--muted)\">${ma} ${mo} ${vsel?vsel.split('§')[2]:''} ${año}<\u002Fdiv>\n    <div style=\"font-size:30px;font-weight:700;margin:6px 0\">${fM(fila.p50)}<\u002Fdiv>\n    <div style=\"font-size:13px\">Rango de mercado: <b>${fM(fila.p25)}<\u002Fb> – <b>${fM(fila.p75)}<\u002Fb><\u002Fdiv>\n    <div style=\"font-size:12px;color:var(--muted);margin-top:8px\">Base: ${fila.n} avisos · Nivel: ${nivelTxt}<\u002Fdiv>\n    ${kmNota?`<div style=\"font-size:12px;margin-top:8px\">${kmNota}<\u002Fdiv>`:''}\n    <div style=\"font-size:11px;color:var(--muted);margin-top:10px\">Precios de oferta publicada en Chileautos; el precio de cierre real suele estar por debajo.<\u002Fdiv>\n  <\u002Fdiv>`;\n}\nfunction usarPrecal(clave, btn){\n  const fila=btn.closest('td');\n  const inp=fila.querySelector('input.dep-in');\n  const ver=btn.parentElement.textContent.split('(')[0].replace('🎯','').trim();\n  inp.value=ver;\n  depCambios[clave]=depCambios[clave]||{};\n  depCambios[clave].canonica=ver;\n  btn.textContent='OK';\n}\nfunction guardarDepuracion(btn){\n  const claves=Object.keys(depCambios);\n  const msg=document.getElementById('dep-msg');\n  if(!claves.length){ msg.textContent='sin cambios para guardar'; return; }\n  claves.forEach(k=>{ const inp=document.querySelector(`input.dep-in[data-clave=\"${k}\"]`);\n    if(inp && depCambios[k].canonica===undefined) depCambios[k].canonica=inp.value; });\n  fetch(`${CTL_URL}/depurar`,{method:'POST',headers:{'Content-Type':'application/json'},\n        body:JSON.stringify(depCambios)})\n    .then(r=>{ if(!r.ok) throw 0;\n      msg.textContent=`✓ ${claves.length} correcciones guardadas — se aplican en el próximo recálculo`;\n      Object.keys(depCambios).forEach(k=>delete depCambios[k]); })\n    .catch(()=>{ msg.textContent='no pude guardar: ¿está corriendo el panel (DASHBOARD.bat)?'; });\n}\nif(document.getElementById('dep-body')){\n  renderDepuracion();\n  document.getElementById('dep-buscar').addEventListener('input',renderDepuracion);\n  document.getElementById('dep-filtro').addEventListener('change',renderDepuracion);\n}\n\n// Aviso discreto si el panel no está activo (los botones igual quedan visibles)\nfetch(`${CTL_URL}/ping`).catch(()=>ctlMsg('Botones inactivos: abrí PANEL.bat para habilitarlos.',''));\ncargarRelleno();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
