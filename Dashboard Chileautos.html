document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-height:95vh;max-width:96vw;width:96vw}\n  @keyframes pop{from{opacity:0;transform:translateY(16px) scale(.98)}to{opacity:1;transform:none}}\n  .modal-head{display:flex;justify-content:space-between;align-items:flex-start;padding:22px 26px 16px;border-bottom:1px solid var(--line)}\n  .modal-head h3{font-size:17px;font-weight:600;letter-spacing:-.3px}\n  .modal-head p{font-size:13px;color:var(--muted);margin-top:4px}\n  .modal-x{background:rgba(0,0,0,.05);border:none;color:var(--muted);width:32px;height:32px;\n        border-radius:8px;cursor:pointer;font-size:12px;transition:color .12s,background .12s}\n  .modal-x:hover{color:var(--ink);background:rgba(0,0,0,.09)}\n  .recalc{display:flex;gap:14px;flex-wrap:wrap;padding:16px 26px;background:var(--panel2);border-bottom:1px solid var(--line)}\n  .rc{flex:1;min-width:120px}\n  .rc .l{font-size:10.5px;letter-spacing:.2px;color:var(--muted);font-weight:500}\n  .rc .v{font-size:19px;font-weight:700;font-family:var(--sans);margin-top:3px;font-variant-numeric:tabular-nums;letter-spacing:-.4px}\n  .rc .d{font-size:11px;color:var(--dim);margin-top:2px}\n  .rc.hl .v{color:var(--signal)}\n  .modal-body{padding:16px 26px;max-height:46vh;overflow-y:auto}\n  #m-table thead th{position:sticky;top:0}\n  #m-table tbody tr.self{background:rgba(0,113,227,.06)}\n  #m-table tbody tr.self td:first-child::after{content:' ◀ este';color:var(--signal);font-size:10px;font-family:var(--mono)}\n  #m-table tbody tr.excluded{opacity:.38}\n  #m-table tbody tr.excluded td:not(:first-child){text-decoration:line-through}\n  .modal-foot{display:flex;justify-content:space-between;align-items:center;padding:14px 26px;border-top:1px solid var(--line);font-size:12px;color:var(--muted)}\n  input[type=checkbox]{accent-color:var(--signal);width:16px;height:16px;cursor:pointer}\n  @media(max-width:880px){.g2,.g3,.tasador{grid-template-columns:1fr}.capture{display:none}}\n  .comp-btn{background:rgba(0,0,0,.04);border:none;color:var(--muted);padding:5px 12px;\n        border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;font-family:var(--sans);\n        transition:color .12s,background .12s}\n  .comp-btn:hover{background:rgba(0,113,227,.1);color:var(--signal)}\n  button{font-family:var(--sans)}\n  button:hover{filter:brightness(.98)}\n#op-table thead th[data-k]{cursor:pointer;user-select:none}\n<\u002Fstyle>\n<\u002Fhead>\n\n<body>\n<header>\n  <div class=\"head-row\">\n    <div class=\"brand\">\n      <div class=\"logo\">CA<\u002Fdiv>\n      <div><h1>Chileautos · Inteligencia de Mercado<\u002Fh1><p id=\"sub\">rotación · oportunidades · precio justo<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"cap\" id=\"cap\"><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"ctlbar\">\n    <button class=\"cbtn\" id=\"ctl-bajar\" onclick=\"ctl('todo',this)\">Bajar base<\u002Fbutton>\n    <button class=\"cbtn\" id=\"ctl-regen\" onclick=\"ctl('regenerar',this)\" title=\"Corre python ver_comentarios.py: motor + dashboard. Cuando la ventana termine, apretá Ctrl+F5 acá.\">Regenerar dashboard<\u002Fbutton>\n    <span id=\"ctl-status\" class=\"stq\"><\u002Fspan>\n    <label style=\"font-size:12px;display:flex;align-items:center;gap:5px;color:var(--muted)\">\n      <input type=\"checkbox\" id=\"ctl-tel\"> incluir teléfonos<\u002Flabel>\n    <button class=\"cbtn sec\" onclick=\"document.getElementById('ctl-extra').classList.toggle('vis')\">Más opciones<\u002Fbutton>\n    <span id=\"ctl-msg\"><\u002Fspan>\n    <div id=\"ctl-extra\">\n      <style>\n        #ctl-extra .grp{margin:2px 0 16px}\n        #ctl-extra .grp-tit{font-size:13px;font-weight:600;color:var(--ink,#1f2937);margin-bottom:2px}\n        #ctl-extra .grp-sub{font-size:12px;color:var(--muted);margin-bottom:9px;max-width:640px;line-height:1.4}\n        #ctl-extra .acc{display:flex;align-items:flex-start;gap:10px;padding:6px 0}\n        #ctl-extra .acc .cbtn{flex:0 0 auto;min-width:190px}\n        #ctl-extra .acc .exp{font-size:12px;color:var(--muted);line-height:1.4;padding-top:6px}\n      <\u002Fstyle>\n\n      <div class=\"grp\">\n        <div class=\"grp-tit\">Correr una pieza suelta<\u002Fdiv>\n        <div class=\"grp-sub\">Cada botón corre <b>solo esa parte<\u002Fb>, sin encadenar el resto. Útil para bajar una porción puntual, o para retomar si una corrida se cayó a mitad.<\u002Fdiv>\n        <div class=\"acc\">\n          <button class=\"cbtn sec\" onclick=\"ctl('incremental',this)\">Solo base<\u002Fbutton>\n          <span class=\"exp\">Baja el catálogo del día (precios, km, avisos nuevos y vendidos). No baja descripciones ni fichas.<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"acc\">\n          <button class=\"cbtn sec\" onclick=\"ctl('descripciones',this)\">Solo descripciones de nuevos<\u002Fbutton>\n          <span class=\"exp\">Baja el texto del vendedor de los avisos nuevos, para extraer etiquetas (único dueño, urgente, dañado…).<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"acc\">\n          <button class=\"cbtn sec\" onclick=\"ctl('specs',this)\">Solo specs de nuevos<\u002Fbutton>\n          <span class=\"exp\">Baja la ficha técnica oficial de los avisos nuevos (versión exacta, cilindrada, equipamiento).<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"acc\">\n          <button class=\"cbtn sec\" onclick=\"ctl('clasificar',this)\">Clasificar + dashboard<\u002Fbutton>\n          <span class=\"exp\">Relee descripciones con IA y palabras clave, y recalcula. <b>Local, no gasta pedidos ni IP.<\u002Fb><\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"acc\">\n          <button class=\"cbtn sec\" onclick=\"ctl('dashboard',this)\">Recalcular dashboard<\u002Fbutton>\n          <span class=\"exp\">Rehace tasaciones, oportunidades y depuración con los datos ya bajados. <b>Local, no toca internet.<\u002Fb><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"grp\">\n        <div class=\"grp-tit\">Rellenar antiguos (manual)<\u002Fdiv>\n        <div class=\"grp-sub\">Completa a mano descripciones o fichas de autos <b>viejos<\u002Fb> que aún no las tienen, en tandas del tamaño que elijas. Consume pedidos: hacelo con la IP descansada.<\u002Fdiv>\n        <div class=\"acc\" style=\"align-items:center\">\n          <span style=\"font-size:12px;color:var(--muted)\">Tamaño de la tanda:<\u002Fspan>\n          <input type=\"number\" id=\"ctl-limite\" value=\"300\" min=\"1\" title=\"cuántos autos antiguos procesar\" style=\"width:80px\">\n        <\u002Fdiv>\n        <div class=\"acc\">\n          <button class=\"cbtn sec\" onclick=\"ctl('descripciones_viejas',this)\">Descripciones antiguas<\u002Fbutton>\n          <span class=\"exp\">Baja el texto del vendedor de autos viejos sin descripción, hasta completar la tanda.<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"acc\">\n          <button class=\"cbtn sec\" onclick=\"ctl('specs_viejas',this)\">Specs antiguas<\u002Fbutton>\n          <span class=\"exp\">Baja la ficha técnica de autos viejos sin ficha, hasta completar la tanda.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"grp\" style=\"margin-bottom:2px\">\n        <div class=\"grp-tit\">Relleno histórico automático<\u002Fdiv>\n        <div class=\"grp-sub\">Si lo activás, la <b>primera corrida de cada día<\u002Fb> rellena sola 150 descripciones + 150 fichas de autos antiguos (~300 pedidos extra). Dejalo en stand by salvo que arranques con la IP bien descansada.<\u002Fdiv>\n        <label style=\"font-size:13px;cursor:pointer;user-select:none;display:inline-flex;align-items:center;gap:7px\">\n          <input type=\"checkbox\" id=\"ctl-relleno\" onchange=\"setRelleno(this)\">\n          <span id=\"ctl-relleno-txt\">cargando…<\u002Fspan>\n        <\u002Flabel>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <nav><div class=\"tabs\">\n    <button class=\"tab active\" data-view=\"radar\">Radar de oportunidades<\u002Fbutton>\n    <button class=\"tab\" data-view=\"rotacion\" style=\"display:none\">Rotación de mercado<\u002Fbutton>\n    <button class=\"tab\" data-view=\"mercado\" style=\"display:none\">Análisis de mercado<\u002Fbutton>\n    <button class=\"tab\" data-view=\"bi\">Análisis de mercado<\u002Fbutton>\n    <button class=\"tab\" data-view=\"tasador\">Tasador<\u002Fbutton>\n    <button class=\"tab\" data-view=\"versiones\" style=\"display:none\">Arreglar versiones<\u002Fbutton>\n    <button class=\"tab\" data-view=\"generaciones\" style=\"display:none\">Generaciones<\u002Fbutton>\n    <button class=\"tab\" data-view=\"depuracion\">Depuración BBDD (avanzado)<\u002Fbutton>\n  <\u002Fdiv><\u002Fnav>\n<\u002Fheader>\n<main><div class=\"wrap\">\n\n  <!-- TASADOR -->\n  <section class=\"view\" id=\"tasador\">\n    <p class=\"lead\">Tasación en base al histórico de avisos capturados. Elegí el auto y el sistema\n    busca el nivel más fino con datos: versión oficial (ficha) → versión de texto → modelo completo.\n    Los precios son de <b>oferta publicada<\u002Fb> (lo que piden, no lo que pagan).<\u002Fp>\n    <div style=\"display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin:14px 0\">\n      <label style=\"font-size:12px\">Marca<br><select id=\"ts-ma\" onchange=\"tsMarca()\" style=\"min-width:140px;padding:6px;border:1px solid var(--line);border-radius:8px;background:var(--panel)\"><\u002Fselect><\u002Flabel>\n      <label style=\"font-size:12px\">Modelo<br><select id=\"ts-mo\" onchange=\"tsModelo()\" style=\"min-width:150px;padding:6px;border:1px solid var(--line);border-radius:8px;background:var(--panel)\"><\u002Fselect><\u002Flabel>\n      <label style=\"font-size:12px\">Versión<br><select id=\"ts-ver\" onchange=\"tsVersion()\" style=\"min-width:230px;padding:6px;border:1px solid var(--line);border-radius:8px;background:var(--panel)\"><\u002Fselect><\u002Flabel>\n      <label style=\"font-size:12px\">Año<br><select id=\"ts-año\" style=\"min-width:90px;padding:6px;border:1px solid var(--line);border-radius:8px;background:var(--panel)\"><\u002Fselect><\u002Flabel>\n      <label style=\"font-size:12px\">Kilometraje<br><input id=\"ts-km\" type=\"number\" placeholder=\"ej: 85000\" style=\"width:110px;padding:6px;border:1px solid var(--line);border-radius:8px;background:var(--panel)\"><\u002Flabel>\n      <button class=\"cbtn\" onclick=\"tsTasar()\">Tasar<\u002Fbutton>\n    <\u002Fdiv>\n    <div id=\"ts-out\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- MERCADO -->\n  <section class=\"view\" id=\"bi\">\n    <div style=\"background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px 16px;margin-bottom:12px\">\n      <div style=\"font-size:15px;font-weight:600;margin-bottom:4px\">Tablero de mercado<\u002Fdiv>\n      <p class=\"lead\" style=\"margin:0\">Filtrá el segmento que te interesa: todos los indicadores y widgets se recalculan al instante sobre esos avisos.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;margin-bottom:12px\">\n      <label style=\"font-size:11px\">Marca<br><select id=\"bi-marca\" onchange=\"biMarca()\" style=\"min-width:130px;padding:6px;border:1px solid var(--line);border-radius:8px;background:var(--panel)\"><\u002Fselect><\u002Flabel>\n      <label style=\"font-size:11px\">Modelo<br><select id=\"bi-modelo\" onchange=\"biGens();biRender()\" style=\"min-width:150px;padding:6px;border:1px solid var(--line);border-radius:8px;background:var(--panel)\"><\u002Fselect><\u002Flabel>\n      <label style=\"font-size:11px\">Gen<br><select id=\"bi-gen\" onchange=\"biRender()\" style=\"min-width:90px;padding:6px;border:1px solid var(--line);border-radius:8px;background:var(--panel)\"><\u002Fselect><\u002Flabel>\n      <label style=\"font-size:11px\">Año desde<br><input id=\"bi-a0\" type=\"number\" placeholder=\"2010\" oninput=\"biRender()\" style=\"width:80px;padding:6px;border:1px solid var(--line);border-radius:8px;background:var(--panel)\"><\u002Flabel>\n      <label style=\"font-size:11px\">hasta<br><input id=\"bi-a1\" type=\"number\" placeholder=\"2026\" oninput=\"biRender()\" style=\"width:80px;padding:6px;border:1px solid var(--line);border-radius:8px;background:var(--panel)\"><\u002Flabel>\n      <label style=\"font-size:11px\">Precio desde (M)<br><input id=\"bi-p0\" type=\"number\" placeholder=\"0\" oninput=\"biRender()\" style=\"width:90px;padding:6px;border:1px solid var(--line);border-radius:8px;background:var(--panel)\"><\u002Flabel>\n      <label style=\"font-size:11px\">hasta (M)<br><input id=\"bi-p1\" type=\"number\" placeholder=\"100\" oninput=\"biRender()\" style=\"width:90px;padding:6px;border:1px solid var(--line);border-radius:8px;background:var(--panel)\"><\u002Flabel>\n      <label style=\"font-size:11px\">Segmento<br><select id=\"bi-seg\" onchange=\"biRender()\" style=\"min-width:130px;padding:6px;border:1px solid var(--line);border-radius:8px;background:var(--panel)\"><option value=\"\">todos<\u002Foption><\u002Fselect><\u002Flabel>\n      <label style=\"font-size:11px\">Vendedor<br><select id=\"bi-vend\" onchange=\"biRender()\" style=\"min-width:110px;padding:6px;border:1px solid var(--line);border-radius:8px;background:var(--panel)\">\n        <option value=\"\">todos<\u002Foption><option>Particular<\u002Foption><option>Automotora<\u002Foption><\u002Fselect><\u002Flabel>\n      <button onclick=\"biLimpiar()\" style=\"height:34px;padding:0 14px;border:1px solid transparent;border-radius:8px;background:rgba(0,0,0,.05);cursor:pointer;font-size:12px;font-family:inherit;color:var(--muted);letter-spacing:-.1px\">limpiar filtros<\u002Fbutton>\n    <\u002Fdiv>\n    <div id=\"bi-kpis\" style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:14px\"><\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:12px\">\n      <div class=\"bi-card\" style=\"background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px\">\n        <div style=\"font-weight:600;font-size:13px;margin-bottom:8px\">Distribución por año<\u002Fdiv>\n        <div id=\"bi-anios\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"bi-card\" style=\"background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px\">\n        <div style=\"font-weight:600;font-size:13px;margin-bottom:8px\" title=\"Días desde que el sistema detectó cada aviso. Los viejos suelen ser vendedores negociables.\">Antigüedad del inventario (días en mercado)<\u002Fdiv>\n        <div id=\"bi-antig\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"bi-card\" style=\"background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px\">\n        <div style=\"font-weight:600;font-size:13px;margin-bottom:8px\">Composición técnica del segmento<\u002Fdiv>\n        <div id=\"bi-comp\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"bi-card\" style=\"background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px\">\n        <div style=\"font-weight:600;font-size:13px;margin-bottom:8px\" title=\"Composición del canal de venta y prima de precio del canal formal sobre el informal.\">Canales del segmento<\u002Fdiv>\n        <div id=\"bi-canales\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"bi-card\" style=\"background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px;grid-column:1/-1\">\n        <div style=\"font-weight:600;font-size:13px;margin-bottom:8px\" title=\"Avisos que bajaron de precio entre las dos últimas capturas comparadas. Vendedores ablandándose en vivo.\">Bajas de precio (última comparación)<\u002Fdiv>\n        <div id=\"bi-bajas\" style=\"max-height:340px;overflow:auto;margin-bottom:14px\"><\u002Fdiv>\n        <div style=\"font-weight:600;font-size:13px;margin-bottom:4px\">Rotación del mercado<\u002Fdiv>\n        <p style=\"font-size:11px;color:var(--muted);margin:0 0 8px\">Si acá ves 0% en todo: la rotación necesita pasadas completas del catálogo (Más opciones → límite 3000, ideal nocturna, 1-2 veces por semana). Las pasadas cortas de 20 páginas solo detectan avisos nuevos.<\u002Fp>\n        <div id=\"bi-rotwrap\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"bi-card\" style=\"background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px\">\n        <div style=\"font-weight:600;font-size:13px;margin-bottom:6px\">Cruce rápido<\u002Fdiv>\n        <div style=\"display:flex;gap:6px;margin-bottom:8px\">\n          <select id=\"bi-dim\" onchange=\"biRender()\" style=\"padding:5px;border:1px solid var(--line);border-radius:8px;background:var(--panel);font-size:11px\">\n            <option value=\"marca\">por marca<\u002Foption><option value=\"modelo\">por modelo<\u002Foption>\n            <option value=\"gen\">por generación<\u002Foption><option value=\"anio\">por año<\u002Foption>\n            <option value=\"ver\">por versión ajustada<\u002Foption><option value=\"vend\">por vendedor<\u002Foption>\n            <option value=\"seg\">por segmento<\u002Foption><\u002Fselect>\n          <select id=\"bi-met\" onchange=\"biRender()\" style=\"padding:5px;border:1px solid var(--line);border-radius:8px;background:var(--panel);font-size:11px\">\n            <option value=\"n\">avisos<\u002Foption><option value=\"pmed\">precio mediano<\u002Foption>\n            <option value=\"kmed\">km mediano<\u002Foption><option value=\"dmed\">días en mercado (mediana)<\u002Foption><\u002Fselect>\n        <\u002Fdiv>\n        <div id=\"bi-cruce\" style=\"max-height:320px;overflow:auto\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section class=\"view\" id=\"mercado\">\n    <p class=\"lead\">Análisis del mercado de usados con tu base activa. Los porcentajes son sobre avisos publicados (oferta), no ventas cerradas.<\u002Fp>\n    <div id=\"mkt-kpis\" style=\"display:flex;gap:12px;flex-wrap:wrap;margin-bottom:22px\"><\u002Fdiv>\n\n    <h3 style=\"font-size:15px;margin:22px 0 4px\">🚩 Señales de alerta — modelos que se revenden casi nuevos<\u002Fh3>\n    <p class=\"lead\" style=\"margin:0 0 10px\">Alto % de autos de 0-1 año a la venta. Puede indicar problemas del modelo, arrepentimiento de compra, o flotas/rent-a-car liquidando. Mirar con cuidado antes de comprar.<\u002Fp>\n    <div id=\"mkt-alertas\"><\u002Fdiv>\n\n    <h3 style=\"font-size:15px;margin:26px 0 4px\">💰 Retención de valor por marca<\u002Fh3>\n    <p class=\"lead\" style=\"margin:0 0 10px\">Cuánto conserva su precio una marca entre 0 y 3 años. <b>Baja retención = peor reventa pero mejor compra usada<\u002Fb> (comprás barato lo que otro depreció). Alta retención = paga bien al revender.<\u002Fp>\n    <div id=\"mkt-deprec\"><\u002Fdiv>\n\n    <h3 style=\"font-size:15px;margin:26px 0 4px\">🎯 Dónde hay más oportunidades por segmento<\u002Fh3>\n    <p class=\"lead\" style=\"margin:0 0 10px\">% de avisos que son oportunidad de oro en cada tipo de auto.<\u002Fp>\n    <div id=\"mkt-seg\"><\u002Fdiv>\n\n    <h3 style=\"font-size:15px;margin:26px 0 4px\">📊 Panorama por marca<\u002Fh3>\n    <p class=\"lead\" style=\"margin:0 0 10px\">Volumen, precio mediano, antigüedad típica y cuánto es venta de particular. Ordená haciendo click en los encabezados.<\u002Fp>\n    <div class=\"table-scroll\"><table class=\"tbl\" id=\"mkt-marca-tbl\"><thead><tr>\n      <th data-mk=\"marca\">Marca<\u002Fth><th class=\"num\" data-mk=\"avisos\">Avisos<\u002Fth>\n      <th class=\"num\" data-mk=\"precio_med\">Precio mediano<\u002Fth>\n      <th class=\"num\" data-mk=\"antiguedad_med\">Antigüedad típica<\u002Fth>\n      <th class=\"num\" data-mk=\"km_med\">Km mediano<\u002Fth>\n      <th class=\"num\" data-mk=\"pct_particular\">% Particular<\u002Fth>\n    <\u002Ftr><\u002Fthead><tbody id=\"mkt-marca\"><\u002Ftbody><\u002Ftable><\u002Fdiv>\n\n    <p class=\"lead\" id=\"mkt-nota\" style=\"margin-top:16px\"><\u002Fp>\n  <\u002Fsection>\n\n  <!-- ARREGLAR VERSIONES POR MODELO -->\n  <section class=\"view\" id=\"versiones\">\n    <div style=\"background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-bottom:14px\">\n      <div style=\"font-size:15px;font-weight:600;margin-bottom:6px\">Arreglar las versiones de un modelo<\u002Fdiv>\n      <p class=\"lead\" style=\"margin:0\">\n        Elegí un modelo y el sistema te propone sus <b>versiones reales<\u002Fb> (agrupando las mil formas\n        distintas en que los vendedores las escriben). Revisá, y si dos grupos son la misma versión,\n        <b>fusionalos<\u002Fb>; si uno está mal, <b>corregí su nombre<\u002Fb> o <b>excluilo<\u002Fb>. Cada cambio mejora\n        el precio justo de todo ese modelo.\n      <\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:14px\">\n      <label style=\"font-size:12px\">Marca<br>\n        <select id=\"vm-marca\" onchange=\"vmMarca()\" style=\"min-width:150px;padding:7px;border:1px solid var(--line);border-radius:8px;background:var(--panel)\"><\u002Fselect><\u002Flabel>\n      <label style=\"font-size:12px\">Modelo<br>\n        <select id=\"vm-modelo\" onchange=\"vmCargar()\" style=\"min-width:180px;padding:7px;border:1px solid var(--line);border-radius:8px;background:var(--panel)\"><\u002Fselect><\u002Flabel>\n      <div style=\"flex:1\"><\u002Fdiv>\n      <span id=\"vm-fusion-info\" style=\"font-size:12px;color:var(--muted)\"><\u002Fspan>\n      <button class=\"cbtn sec\" id=\"vm-fusionar\" style=\"display:none\" onclick=\"vmFusionar()\">Fusionar seleccionadas<\u002Fbutton>\n      <button class=\"cbtn\" onclick=\"vmGuardar(this)\">Guardar cambios<\u002Fbutton>\n      <span id=\"vm-msg\" style=\"font-size:12px;font-family:var(--mono)\"><\u002Fspan>\n    <\u002Fdiv>\n    <div id=\"vm-resumen\" style=\"font-size:13px;color:var(--muted);margin-bottom:10px\"><\u002Fdiv>\n    <div id=\"vm-lista\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- GENERACIONES -->\n  <section class=\"view\" id=\"generaciones\">\n    <div style=\"background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-bottom:14px\">\n      <div style=\"font-size:15px;font-weight:600;margin-bottom:6px\">Corregir generaciones de un modelo<\u002Fdiv>\n      <p class=\"lead\" style=\"margin:0\">\n        Los cortes de generación salen de info internacional (Wikipedia), pero en Chile los autos\n        pueden haber llegado otro año, o mantener una generación que afuera ya cambió. Acá ajustás\n        los <b>rangos de años por generación<\u002Fb> de cada modelo, y corregís avisos puntuales que el\n        sistema clasificó mal. <b>Ojo:<\u002Fb> un año puede tener dos generaciones si el cambio fue a mitad\n        de año — dejá que se solapen y el sistema los marca para revisar por fotos.\n      <\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:14px\">\n      <label style=\"font-size:12px\">Marca<br>\n        <select id=\"gm-marca\" onchange=\"gmMarca()\" style=\"min-width:150px;padding:7px;border:1px solid var(--line);border-radius:8px;background:var(--panel)\"><\u002Fselect><\u002Flabel>\n      <label style=\"font-size:12px\">Modelo<br>\n        <select id=\"gm-modelo\" onchange=\"gmCargar()\" style=\"min-width:180px;padding:7px;border:1px solid var(--line);border-radius:8px;background:var(--panel)\"><\u002Fselect><\u002Flabel>\n    <\u002Fdiv>\n    <div id=\"gm-panel\" style=\"display:none\">\n      <div style=\"font-size:14px;font-weight:600;margin-bottom:8px\">Rangos de generación<\u002Fdiv>\n      <div id=\"gm-rangos\"><\u002Fdiv>\n      <button class=\"cbtn sec\" onclick=\"gmAgregarRango()\" style=\"margin-top:8px\">+ Agregar generación<\u002Fbutton>\n      <div style=\"display:flex;gap:10px;align-items:center;margin:14px 0\">\n        <button class=\"cbtn\" onclick=\"gmGuardarRangos(this)\">Guardar cortes de años<\u002Fbutton>\n        <span id=\"gm-msg\" style=\"font-size:12px;font-family:var(--mono)\"><\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"font-size:14px;font-weight:600;margin:18px 0 8px\">Avisos de este modelo (corregí los mal clasificados)<\u002Fdiv>\n      <div style=\"font-size:12px;color:var(--muted);margin-bottom:8px\">La generación se asigna por el año. Si un aviso está mal (lo confirmaste por fotos), fijá su generación real acá — eso manda sobre el corte automático.<\u002Fdiv>\n      <div id=\"gm-avisos\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- DEPURACION -->\n  <section class=\"view\" id=\"depuracion\">\n    <div style=\"background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-bottom:14px\">\n      <div style=\"font-size:15px;font-weight:600;margin-bottom:6px\">Depuración por modelo — todos los avisos, fila por fila<\u002Fdiv>\n      <p class=\"lead\" style=\"margin:0\">Elegí un modelo y mirá cada aviso con su generación, la versión que escribió el vendedor, la <b>versión ajustada<\u002Fb> que propone el sistema (ficha oficial, o deducción ≈), los datos de ficha y el comentario. Corregí la versión de un aviso con el ✏ — tu corrección manda sobre todo.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:10px\">\n      <label style=\"font-size:12px\">Marca<br>\n        <select id=\"db-marca\" onchange=\"dbMarca()\" style=\"min-width:150px;padding:7px;border:1px solid var(--line);border-radius:8px;background:var(--panel)\"><\u002Fselect><\u002Flabel>\n      <label style=\"font-size:12px\">Modelo<br>\n        <select id=\"db-modelo\" onchange=\"dbCargar()\" style=\"min-width:180px;padding:7px;border:1px solid var(--line);border-radius:8px;background:var(--panel)\"><\u002Fselect><\u002Flabel>\n      <label style=\"font-size:12px\">Buscar en versión/comentario<br>\n        <input id=\"db-busca\" oninput=\"dbRender()\" placeholder=\"ej: allure, gt, furgón...\" style=\"min-width:220px;padding:7px;border:1px solid var(--line);border-radius:8px;background:var(--panel)\"><\u002Flabel>\n      <button id=\"db-ficha-btn\" onclick=\"dbToggleFicha()\" style=\"height:34px;padding:0 16px;border:1px solid transparent;border-radius:8px;background:rgba(0,0,0,.05);cursor:pointer;font-size:12.5px;font-family:inherit;color:var(--ink);letter-spacing:-.1px\">Mostrar ficha técnica<\u002Fbutton>\n    <\u002Fdiv>\n    <div id=\"db-gens\" style=\"display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px\"><\u002Fdiv>\n    <div id=\"db-resumen\" style=\"margin-bottom:10px\"><\u002Fdiv>\n    <div id=\"db-info\" style=\"font-size:12px;color:var(--muted);margin-bottom:6px\"><\u002Fdiv>\n    <div class=\"table-scroll\" style=\"border-radius:10px;max-height:80vh;overflow:auto\">\n      <div id=\"db-tabla\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:none\">\n    <div style=\"background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-bottom:14px\">\n      <div style=\"font-size:15px;font-weight:600;margin-bottom:6px\">¿Qué es esta pantalla y para qué sirve?<\u002Fdiv>\n      <p class=\"lead\" style=\"margin:0 0 8px\">\n        El sistema agrupa los autos para calcular el <b>precio justo<\u002Fb>. A veces mete en la misma bolsa\n        versiones que no deberían compararse (un GT con un Active, un furgón con un familiar). Acá los\n        <b>corregís vos<\u002Fb>, y cada corrección mejora todas las tasaciones futuras de ese modelo.\n      <\u002Fp>\n      <div style=\"font-size:13px;color:var(--muted);line-height:1.6\">\n        <b>Cómo usarla, en 3 pasos:<\u002Fb><br>\n        1. Mirá la columna <b>Dispersión<\u002Fb>: si es alta ((!)), ese grupo mezcla autos de precio muy distinto — es candidato a corregir.<br>\n        2. Mirá <b>Ejemplos<\u002Fb> y <b>Specs<\u002Fb>: te muestran qué versiones cayeron juntas. Si ves que mezcla cosas distintas, escribí en <b>Versión canónica<\u002Fb> el nombre correcto que las unifique, o marcá <b>Excluir<\u002Fb> si es basura (un modelo mal escrito).<br>\n        3. <b>Guardar cambios<\u002Fb>. En el próximo \"Clasificar + dashboard\" el precio justo se recalcula con tu corrección.\n      <\u002Fdiv>\n      <p class=\"lead\" style=\"margin:8px 0 0;font-size:12px\">\n        <b>Consejo:<\u002Fb> no intentes depurar todo. Empezá por los 20-30 modelos que más comprás/mirás — son el 80% de tu radar. El resto puede esperar.\n        Las generaciones (gen I/II/III por año) se editan aparte en <span class=\"mono\">generaciones.xlsx<\u002Fspan>.\n      <\u002Fp>\n    <\u002Fdiv>\n    <div class=\"filters\">\n      <input type=\"text\" id=\"dep-buscar\" placeholder=\"Buscar marca o modelo…\">\n      <select id=\"dep-filtro\">\n        <option value=\"\">Todas las firmas<\u002Foption>\n        <option value=\"sin\">Solo sin firma reconocible<\u002Foption>\n        <option value=\"pend\">Solo sin canónica confirmada<\u002Foption>\n        <option value=\"rev\">(!) Posible sub-versión oculta (revisar primero)<\u002Foption>\n      <\u002Fselect>\n      <button class=\"cbtn\" onclick=\"guardarDepuracion(this)\">Guardar cambios<\u002Fbutton>\n      <span id=\"dep-msg\" style=\"font-size:12px;font-family:var(--mono)\"><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"table-scroll\">\n      <table class=\"tbl\"><thead><tr>\n        <th>Marca / Modelo<\u002Fth><th>Gen<\u002Fth><th>Firma detectada<\u002Fth><th class=\"num\">Avisos<\u002Fth>\n        <th class=\"num\">Mediana<\u002Fth><th>Años<\u002Fth><th>Versión canónica (editar)<\u002Fth><th>Excluir<\u002Fth>\n      <\u002Ftr><\u002Fthead><tbody id=\"dep-body\"><\u002Ftbody><\u002Ftable>\n    <\u002Fdiv>\n    <p class=\"lead\" id=\"dep-nota\" style=\"margin-top:10px\"><\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ROTACION -->\n  <section class=\"view\" id=\"rotacion\">\n    <p class=\"lead\">Qué tan rápido se mueve cada modelo. Comparando dos capturas, medimos cuántos avisos <b>salieron del mercado<\u002Fb> (proxy de venta) y estimamos los días que tarda en venderse.<\u002Fp>\n    <div class=\"rotbar\" id=\"rotbar\"><\u002Fdiv>\n    <div class=\"callout\" id=\"rot-note\"><\u002Fdiv>\n    <p class=\"section-title\">Velocidad de venta por modelo<\u002Fp>\n    <div class=\"viewbtns\">\n      <button class=\"vbtn active\" data-inv=\"alto\">Alto inventario <span id=\"c-alto\"><\u002Fspan><\u002Fbutton>\n      <button class=\"vbtn\" data-inv=\"bajo\">Bajo inventario <span id=\"c-bajo\"><\u002Fspan><\u002Fbutton>\n      <button class=\"vbtn\" data-inv=\"todos\">Todos <span id=\"c-todos\"><\u002Fspan><\u002Fbutton>\n    <\u002Fdiv>\n    <p class=\"vhint\" id=\"inv-hint\"><\u002Fp>\n    <div class=\"filters\">\n      <input type=\"text\" id=\"rot-buscar\" placeholder=\"Buscar marca o modelo…\">\n      <select id=\"rot-orden\">\n        <option value=\"rapido\">Más rápidos primero<\u002Foption>\n        <option value=\"lento\">Más lentos primero<\u002Foption>\n        <option value=\"stock\">Mayor stock<\u002Foption>\n      <\u002Fselect>\n      <span style=\"color:var(--dim);font-size:12px;margin-left:auto\" id=\"rot-count\"><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"table-scroll\">\n      <table id=\"rot-table\"><thead><tr>\n        <th data-k=\"modelo\">Modelo<\u002Fth>\n        <th data-k=\"stock\" class=\"num\">Stock inicial<\u002Fth>\n        <th data-k=\"salieron\" class=\"num\">Salieron<\u002Fth>\n        <th data-k=\"tasa_salida\" class=\"num\">% que salió<\u002Fth>\n        <th data-k=\"dias_venta_est\" class=\"num\">Días venta est.<\u002Fth>\n        <th data-k=\"velocidad\">Velocidad<\u002Fth>\n      <\u002Ftr><\u002Fthead><tbody><\u002Ftbody><\u002Ftable>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- RADAR -->\n  <section class=\"view active\" id=\"radar\">\n    <p class=\"lead\">Vehículos con precio por debajo del precio justo de su segmento (misma marca y modelo, ±3 años, ajustado por kilometraje), o con bajo uso anual.<\u002Fp>\n    <div class=\"kpis\">\n      <div class=\"kpi gold\"><div class=\"lbl\">Oportunidades de oro<\u002Fdiv><div class=\"val\" id=\"k-oro\"><\u002Fdiv><div class=\"sub\">precio bajo + bajo km<\u002Fdiv><\u002Fdiv>\n      <div class=\"kpi good\"><div class=\"lbl\">Bajo precio (≥15%)<\u002Fdiv><div class=\"val\" id=\"k-precio\"><\u002Fdiv><div class=\"sub\">vs. precio justo<\u002Fdiv><\u002Fdiv>\n      <div class=\"kpi blue\"><div class=\"lbl\">Bajo kilometraje<\u002Fdiv><div class=\"val\" id=\"k-km\"><\u002Fdiv><div class=\"sub\">&lt; 10.000 km/año<\u002Fdiv><\u002Fdiv>\n      <div class=\"kpi blue\"><div class=\"lbl\">Nuevos hoy<\u002Fdiv><div class=\"val\" id=\"kpi-nuevos\">—<\u002Fdiv><div class=\"sub\" id=\"kpi-nuevos-sub\">detectados hoy<\u002Fdiv><\u002Fdiv>\n      <div class=\"kpi\"><div class=\"lbl\">Avisos analizados<\u002Fdiv><div class=\"val\" id=\"k-tot\"><\u002Fdiv><div class=\"sub\">captura más reciente<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"viewbtns\">\n      <button class=\"vbtn active\" data-f=\"oro\">Oro <span id=\"vb-oro\"><\u002Fspan><\u002Fbutton>\n      <button class=\"vbtn\" data-f=\"precio\">Bajo precio <span id=\"vb-precio\"><\u002Fspan><\u002Fbutton>\n      <button class=\"vbtn\" data-f=\"km\">Bajo km <span id=\"vb-km\"><\u002Fspan><\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"filters\">\n      <input type=\"text\" id=\"op-buscar\" placeholder=\"Buscar marca o modelo…\">\n      <select id=\"op-orden\">\n        <option value=\"fresco\" selected=\"\">Orden: más frescos primero<\u002Foption>\n        <option value=\"mercado\">Orden: más vendidos<\u002Foption>\n        <option value=\"descuento\">Mayor descuento<\u002Foption>\n        <option value=\"precio\">Menor precio<\u002Foption>\n      <\u002Fselect>\n      <select id=\"op-frescura\" onchange=\"renderOps()\">\n        <option value=\"\">Detectado: siempre<\u002Foption>\n        <option value=\"0\">Detectado: hoy<\u002Foption>\n        <option value=\"1\">Detectado: ≤ 1 día<\u002Foption>\n        <option value=\"2\">Detectado: ≤ 2 días<\u002Foption>\n        <option value=\"7\">Detectado: ≤ 7 días<\u002Foption>\n      <\u002Fselect>\n      <span style=\"position:relative;display:inline-block\">\n        <button id=\"op-anio-btn\" onclick=\"opAnioPanel(event)\" style=\"height:34px;padding:0 12px;border:1px solid transparent;border-radius:8px;background:rgba(0,0,0,.04);cursor:pointer;font-size:13px;font-family:inherit;color:var(--ink);letter-spacing:-.1px\">Año: todos ▾<\u002Fbutton>\n        <div id=\"op-anio-panel\" style=\"display:none;position:absolute;top:110%;left:0;z-index:60;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px;box-shadow:0 8px 24px rgba(0,0,0,.12);width:238px\">\n          <div style=\"display:flex;justify-content:space-between;margin-bottom:8px;font-size:11px\">\n            <b>Marcá los años a analizar<\u002Fb>\n            <a href=\"javascript:opAnioLimpiar()\" style=\"color:var(--signal,#3b82f6)\">limpiar<\u002Fa>\n          <\u002Fdiv>\n          <div id=\"op-anio-grid\" style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:4px;max-height:220px;overflow:auto\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fspan>\n      <input id=\"op-pmax\" type=\"number\" placeholder=\"Precio máx (M)\" style=\"width:118px\" oninput=\"renderOps()\">\n      <select id=\"op-vendedor\">\n        <option value=\"\">Vendedor: todos<\u002Foption>\n        <option value=\"Particular\" selected=\"\">Solo particulares<\u002Foption>\n        <option value=\"Automotora\">Solo automotoras<\u002Foption>\n      <\u002Fselect>\n      <select id=\"op-coment\">\n        <option value=\"\">Comentario: todos<\u002Foption>\n        <option value=\"ok\">Sin banderas rojas<\u002Foption>\n        <option value=\"roja\">Solo banderas rojas<\u002Foption>\n        <option value=\"km_dudoso\">Solo km dudoso<\u002Foption>\n        <option value=\"venta_urgente\">🔥 Venta urgente<\u002Foption>\n        <option value=\"trato_directo\">Vende su dueño<\u002Foption>\n        <option value=\"precio_conversable\">Precio conversable<\u002Foption>\n        <option value=\"unico_dueno\">Único dueño<\u002Foption>\n        <option value=\"mantencion_al_dia\">Mantención al día<\u002Foption>\n        <option value=\"impecable\">Impecable<\u002Foption>\n        <option value=\"con\">Con comentario<\u002Foption>\n      <\u002Fselect>\n      <span style=\"color:var(--dim);font-size:12px;margin-left:auto\" id=\"op-count\"><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"table-scroll\">\n      <table id=\"op-table\"><thead><tr>\n        <th data-k=\"veh\" title=\"click para ordenar\">Vehículo ⇅<\u002Fth>\n        <th data-k=\"mercado\" class=\"num\" title=\"click para ordenar\">Mercado ⇅<\u002Fth>\n        <th data-k=\"año\" class=\"num\" title=\"click para ordenar\">Año ⇅<\u002Fth>\n        <th data-k=\"fecha\" class=\"num\" title=\"click para ordenar: fecha en que el sistema detectó el aviso\">Fecha ⇅<\u002Fth>\n        <th data-k=\"km\" class=\"num\" title=\"click para ordenar\">Km ⇅<\u002Fth>\n        <th data-k=\"precio\" class=\"num\" title=\"click para ordenar\">Precio ⇅<\u002Fth>\n        <th data-k=\"precio_justo\" class=\"num\" title=\"click para ordenar\">Precio justo ⇅<\u002Fth>\n        <th data-k=\"descuento\" class=\"num\" title=\"click para ordenar\">Descuento ⇅<\u002Fth>\n        <th data-k=\"entidad\" title=\"click para ordenar\">Vendedor ⇅<\u002Fth>\n        <th>Estado (comentario)<\u002Fth>\n        <th>Comparables<\u002Fth>\n        <th>Aviso<\u002Fth>\n      <\u002Ftr><\u002Fthead><tbody><\u002Ftbody><\u002Ftable>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fdiv><\u002Fmain>\n\n<div class=\"modal-bg\" id=\"ficha-bg\">\n  <div class=\"modal\" role=\"dialog\" aria-modal=\"true\" style=\"max-width:560px\">\n    <div class=\"modal-head\">\n      <div>\n        <h3>Ficha técnica (Especificaciones oficiales)<\u002Fh3>\n        <p id=\"ficha-titulo\"><\u002Fp>\n      <\u002Fdiv>\n      <button class=\"modal-x\" onclick=\"cerrarFicha()\" aria-label=\"Cerrar\">cerrar<\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"modal-body\" style=\"max-height:60vh;overflow:auto\">\n      <table class=\"tbl\" style=\"font-size:13px\"><tbody id=\"ficha-body\"><\u002Ftbody><\u002Ftable>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"modal-bg\" id=\"coment-bg\">\n  <div class=\"modal\" role=\"dialog\" aria-modal=\"true\" style=\"max-width:640px\">\n    <div class=\"modal-head\">\n      <div>\n        <h3>Comentario del vendedor<\u002Fh3>\n        <p id=\"coment-titulo\"><\u002Fp>\n      <\u002Fdiv>\n      <button class=\"modal-x\" onclick=\"cerrarComentario()\" aria-label=\"Cerrar\">cerrar<\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"modal-body\">\n      <p id=\"coment-texto\" style=\"white-space:pre-wrap;line-height:1.6;font-size:14px;color:var(--ink)\"><\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"modal-bg\" id=\"modal-bg\">\n  <div class=\"modal\" role=\"dialog\" aria-modal=\"true\" style=\"max-width:96vw;width:96vw\">\n    <div class=\"modal-head\">\n      <div>\n        <h3 id=\"m-title\">Comparables<\u002Fh3>\n        <p id=\"m-sub\"><\u002Fp>\n      <\u002Fdiv>\n      <button class=\"modal-x\" id=\"m-close\" aria-label=\"Cerrar\">cerrar<\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"recalc\" id=\"m-recalc\"><\u002Fdiv>\n    <div class=\"modal-body\">\n      <div id=\"m-filtros\" style=\"display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding:8px 4px;font-size:12px\"><\u002Fdiv>\n      <div style=\"font-size:11px;color:var(--muted);padding:0 4px 6px\"><b>Valor justo equiv.<\u002Fb> = el valor de MERCADO de un auto como el que evaluás, puesto en el año y km de cada fila (se calcula desde el <b>precio justo<\u002Fb>, no desde el precio pedido). Más viejo o con más km, <b>baja<\u002Fb>; más nuevo o con menos km, <b>sube<\u002Fb>. La lectura: si el <b>precio pedido<\u002Fb> de una fila supera su valor justo equivalente, esa fila está cara.<\u002Fdiv>\n      <div class=\"table-scroll\" style=\"border-radius:10px\">\n        <table id=\"m-table\">\n          <thead><tr>\n            <th>Incluir<\u002Fth>\n            <th class=\"num msort\" data-sort=\"año\" style=\"cursor:pointer\" title=\"Ordenar por año\" onclick=\"ordenarComp(&quot;año&quot;)\">Año ⇅<\u002Fth>\n            <th class=\"num msort\" data-sort=\"km\" style=\"cursor:pointer\" title=\"Ordenar por km\" onclick=\"ordenarComp(&quot;km&quot;)\">Km ⇅<\u002Fth>\n            <th class=\"num msort\" data-sort=\"kmanual\" style=\"cursor:pointer\" title=\"Ordenar por km/año\" onclick=\"ordenarComp(&quot;kmanual&quot;)\">Km/año ⇅<\u002Fth>\n            <th class=\"num msort\" data-sort=\"precio\" style=\"cursor:pointer\" title=\"Ordenar por precio\" onclick=\"ordenarComp(&quot;precio&quot;)\">Precio ⇅<\u002Fth>\n            <th class=\"num msort\" data-sort=\"ajustado\" style=\"cursor:pointer\" title=\"VALOR DE MERCADO de un auto como el que evaluás, puesto en el año y km de esta fila (parte del precio justo, no del precio pedido). Si el precio pedido de la fila supera esto, la fila está cara.\" onclick=\"ordenarComp(&quot;ajustado&quot;)\">Valor justo equiv. ⇅<\u002Fth>\n            <th>Versión (vendedor)<\u002Fth>\n            <th title=\"Versión según la ficha técnica oficial de Chileautos, cuando existe.\">Sugerida (ficha)<\u002Fth>\n            <th class=\"num msort\" data-sort=\"gen\" style=\"cursor:pointer\" title=\"Ordenar por generación\" onclick=\"ordenarComp(&quot;gen&quot;)\">Gen ⇅<\u002Fth>\n            <th>Vendedor<\u002Fth><th>Aviso<\u002Fth>\n          <\u002Ftr><\u002Fthead>\n          <tbody><\u002Ftbody>\n        <\u002Ftable>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"modal-foot\">\n      <span id=\"m-foot-info\"><\u002Fspan>\n      <div style=\"display:flex;gap:8px\">\n        <button class=\"vbtn\" id=\"m-fix-ver\" title=\"Si los comparables mezclan versiones distintas, corregilas en la herramienta Arreglar versiones\">✏ Arreglar versiones de este modelo<\u002Fbutton>\n        <button class=\"vbtn\" id=\"m-reset\">Restaurar todos<\u002Fbutton>\n        <button class=\"vbtn primary\" id=\"m-save\">Guardar cambios<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<footer id=\"foot\"><\u002Ffooter>\n\n<script>\n/*__DATA__*/\n<\u002Fscript>\n<script>\nconst f0=n=>new Intl.NumberFormat('es-CL').format(Math.round(n));\nconst fM=n=>'$'+new Intl.NumberFormat('es-CL').format(Math.round(n));\n\n// Header\nconst caps=DATA.capturas;\ndocument.getElementById('cap').innerHTML=`captura analizada<br><b>${DATA.captura_analizada}<\u002Fb> · ${f0(DATA.resumen.total)} avisos`;\ndocument.getElementById('foot').textContent='';\n\n// Tabs\ndocument.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{\n  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));\n  document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));\n  t.classList.add('active');\n  document.getElementById(t.dataset.view).classList.add('active');\n}));\n\n// ===== ROTACION =====\nconst R=DATA.rotacion;\nif(R && R.valida===false){\n  // Rotación no medible aún: mensaje honesto en vez de números falsos\n  const g=R.global||{};\n  const cont=document.getElementById('rotacion');\n  const nota=document.getElementById('rot-note');\n  if(nota) nota.innerHTML=`<b>⏳ Rotación todavía no disponible.<\u002Fb><br>${R.motivo||''}`\n    +`<br><br><span style=\"color:var(--muted);font-size:12px\">Capturas comparadas: ${g.fecha_desde||'—'} y ${g.fecha_hasta||'—'} · solapamiento ${g.solapamiento_pct!=null?g.solapamiento_pct+'%':'—'}. `\n    +`Para medir rotación real necesito 2+ días seguidos de la misma base — bajá la base cada día y en ~1 semana esta pestaña se activa sola con datos creíbles.<\u002Fspan>`;\n  // ocultar la tabla y filtros que no tienen sentido sin datos\n  ['rotbar','rot-table'].forEach(id=>{const e=document.getElementById(id); if(e) e.style.display='none';});\n  const filtros=document.querySelector('#rotacion .filters'); if(filtros) filtros.style.display='none';\n  const tabs=document.querySelector('#rotacion .seg'); if(tabs) tabs.style.display='none';\n}else if(R && R.valida!==false){\n  const g=R.global;\n  document.getElementById('rotbar').innerHTML=`\n    <div class=\"rb\"><div class=\"l\">Período<\u002Fdiv><div class=\"v\" style=\"font-size:18px\">${g.fecha_desde} → ${g.fecha_hasta}<\u002Fdiv><div class=\"d\">${g.dias} días<\u002Fdiv><\u002Fdiv>\n    <div class=\"rb\"><div class=\"l\">Salieron del mercado<\u002Fdiv><div class=\"v\" style=\"color:var(--accent)\">${f0(g.desaparecidos)}<\u002Fdiv><div class=\"d\">${g.tasa_salida_periodo}% · ${g.tasa_salida_diaria}%/día<\u002Fdiv><\u002Fdiv>\n    <div class=\"rb\"><div class=\"l\">Avisos nuevos<\u002Fdiv><div class=\"v\" style=\"color:var(--signal)\">${f0(g.nuevos)}<\u002Fdiv><div class=\"d\">aparecieron en el período<\u002Fdiv><\u002Fdiv>\n    <div class=\"rb\"><div class=\"l\">Bajaron de precio<\u002Fdiv><div class=\"v\" style=\"color:var(--good)\">${f0(g.bajaron_precio)}<\u002Fdiv><div class=\"d\">de ${f0(g.con_cambio_precio)} que cambiaron<\u002Fdiv><\u002Fdiv>`;\n  document.getElementById('rot-note').innerHTML=`<b>Cómo leerlo:<\u002Fb> \"salió del mercado\" significa que el aviso estaba el ${g.fecha_desde} y ya no el ${g.fecha_hasta}. Es el mejor indicio de venta que tenemos, pero un aviso también puede irse por expirar o republicarse. Tomalo como demanda relativa entre modelos, no como ventas exactas. Con más capturas se afina.`;\n\n  const alto=R.por_modelo.filter(m=>m.inventario==='alto');\n  const bajo=R.por_modelo.filter(m=>m.inventario==='bajo');\n  document.getElementById('c-alto').textContent='('+alto.length+')';\n  document.getElementById('c-bajo').textContent='('+bajo.length+')';\n  document.getElementById('c-todos').textContent='('+R.por_modelo.length+')';\n\n  const HINTS={\n    alto:'Modelos con 10 o más autos en stock. La rotación es confiable porque hay volumen suficiente.',\n    bajo:'Modelos con menos de 10 autos. La rotación es solo una señal débil: con pocos autos, un par de ventas distorsiona el porcentaje.',\n    todos:'Todos los modelos sin filtrar. Ojo: los de bajo inventario tienen porcentajes poco confiables.'\n  };\n  let invView='alto', rotSort='rapido';\n  const maxStock=Math.max(...R.por_modelo.map(m=>m.stock),1);\n  document.querySelectorAll('[data-inv]').forEach(b=>b.addEventListener('click',()=>{\n    document.querySelectorAll('[data-inv]').forEach(x=>x.classList.remove('active'));\n    b.classList.add('active'); invView=b.dataset.inv; document.getElementById('inv-hint').textContent=HINTS[invView]; renderRot();\n  }));\n  document.getElementById('inv-hint').textContent=HINTS.alto;\n  document.getElementById('rot-orden').addEventListener('change',e=>{rotSort=e.target.value;renderRot();});\n  document.getElementById('rot-buscar').addEventListener('input',renderRot);\n\n  function renderRot(){\n    const q=document.getElementById('rot-buscar').value.toLowerCase().trim();\n    let rows=R.por_modelo.filter(m=>{\n      if(invView==='alto'&&m.inventario!=='alto')return false;\n      if(invView==='bajo'&&m.inventario!=='bajo')return false;\n      if(q && !((m.marca+' '+m.modelo).toLowerCase().includes(q)))return false;\n      return true;\n    });\n    rows.sort((a,b)=>{\n      if(rotSort==='stock')return b.stock-a.stock;\n      if(rotSort==='lento')return a.tasa_salida-b.tasa_salida;\n      return b.tasa_salida-a.tasa_salida;\n    });\n    document.getElementById('rot-count').textContent=rows.length+' modelos';\n    document.querySelector('#rot-table tbody').innerHTML=rows.map(m=>{\n      const dv=m.dias_venta_est?`~${m.dias_venta_est} días`:'<span style=\"color:var(--dim)\">s/d<\u002Fspan>';\n      const w=Math.round(60*m.tasa_salida/100)+4;\n      const col=m.tasa_salida>=45?'var(--good)':m.tasa_salida>=25?'var(--signal)':'var(--dim)';\n      const warn=m.inventario==='bajo'?' <span class=\"badge b-warn\" title=\"pocos autos, dato poco confiable\">bajo inv.<\u002Fspan>':'';\n      return `<tr style=\"cursor:pointer\" title=\"click: analizar este modelo en el BI\" onclick=\"rotAlBI('${(m.marca||'').replace(/'/g,'')}','${(m.modelo||'').replace(/'/g,'')}')\">\n        <td class=\"veh\">${m.marca} ${m.modelo}${warn}<\u002Ftd>\n        <td class=\"num\">${m.stock.toLocaleString('es-CL')}<\u002Ftd>\n        <td class=\"num\">${m.salieron}<\u002Ftd>\n        <td class=\"num\"><b>${m.tasa_salida}%<\u002Fb><\u002Ftd>\n        <td class=\"num\">${dv}<\u002Ftd>\n        <td><span class=\"speed\"><span class=\"bar\" style=\"width:${w}px;background:${col}\"><\u002Fspan><\u002Fspan><\u002Ftd>\n      <\u002Ftr>`;\n    }).join('');\n  }\n  document.querySelectorAll('#rot-table thead th[data-k]').forEach(th=>th.addEventListener('click',()=>{\n    const k=th.dataset.k;\n    if(k==='tasa_salida')rotSort=(rotSort==='rapido')?'lento':'rapido';\n    else if(k==='stock')rotSort='stock';\n    document.getElementById('rot-orden').value=(rotSort==='stock')?'stock':(rotSort==='lento'?'lento':'rapido');\n    renderRot();\n  }));\n  renderRot();\n}\n\n// ===== RADAR =====\nconst ops=DATA.oportunidades||[];\nconst res=DATA.resumen;\ndocument.getElementById('k-oro').textContent=f0(res.op_oro);\ndocument.getElementById('k-precio').textContent=f0(res.op_precio);\ndocument.getElementById('k-km').textContent=f0(res.op_km);\ndocument.getElementById('k-tot').textContent=f0(res.total);\ndocument.getElementById('vb-oro').textContent='('+res.op_oro+')';\ndocument.getElementById('vb-precio').textContent='('+res.op_precio+')';\ndocument.getElementById('vb-km').textContent='('+res.op_km+')';\nconst maxMkt=Math.max(...ops.map(o=>o.mercado||0),1);\nlet opView='oro', opSort='mercado';\ndocument.querySelectorAll('[data-f]').forEach(b=>b.addEventListener('click',()=>{\n  document.querySelectorAll('[data-f]').forEach(x=>x.classList.remove('active'));\n  b.classList.add('active'); opView=b.dataset.f; renderOps();\n}));\ndocument.getElementById('op-orden').addEventListener('change',e=>{opSort=e.target.value;renderOps();});\ndocument.getElementById('op-buscar').addEventListener('input',renderOps);\ndocument.getElementById('op-vendedor').addEventListener('change',renderOps);\ndocument.getElementById('op-coment').addEventListener('change',renderOps);\n\nconst ETQ_LABEL={\n  daniado:['dañado','rojo'], problema_legal:['problema legal','rojo'], km_dudoso:['km dudoso','rojo'],\n  origen_especial:['internado','gris'], impecable:['impecable','verde'],\n  unico_dueno:['único dueño','verde'], pocos_duenos:['pocos dueños','verde'],\n  mantencion_al_dia:['mantención al día','verde'], listo_transferir:['transferible','verde'],\n  poco_uso:['poco uso','verde'], facilidades:['financia/permuta','gris'], plantilla:['aviso genérico','gris'],\n  venta_urgente:['🔥 venta urgente','gold'], precio_conversable:['precio conversable','verde'],\n  precio_condicionado:['precio solo c/crédito','rojo'], precio_mas_iva:['+ IVA','rojo'],\n  modificado:['modificado (DPF/gas)','gris'], trato_directo:['vende su dueño','verde']\n};\nfunction chips(etqs, idConComentario){\n  if(!etqs||!etqs.length) return '<span style=\"color:var(--dim);font-size:12px\">—<\u002Fspan>';\n  const clickable = idConComentario ? `onclick=\"verComentario('${idConComentario}')\" style=\"margin:1px;cursor:pointer\" title=\"Ver comentario completo\"` : 'style=\"margin:1px\"';\n  return etqs.map(e=>{\n    const def=ETQ_LABEL[e]||[e,'gris'];\n    const cls=def[1]==='rojo'?'b-warn':def[1]==='verde'?'b-good':def[1]==='gold'?'b-gold':'b-auto';\n    return `<span class=\"badge ${cls}\" ${clickable}>${def[0]}<\u002Fspan>`;\n  }).join(' ');\n}\nfunction verComentario(id){\n  const o=(ops||[]).find(x=>x.id===id);\n  if(!o||!o.comentario) return;\n  document.getElementById('coment-titulo').textContent=`${o.marca} ${o.modelo} ${o.año||''}`.trim();\n  const res=(o.resumen_ia?`⚡ ${o.resumen_ia}${o.urgencia>=6?` · urgencia ${o.urgencia}/10`:''}\\n\\n`:'');\n  document.getElementById('coment-texto').textContent=res+o.comentario;\n  document.getElementById('coment-bg').classList.add('open');\n}\nfunction verFicha(id){\n  const o=(ops||[]).find(x=>x.id===id);\n  if(!o||!o.ficha) return;\n  document.getElementById('ficha-titulo').textContent=`${o.marca} ${o.modelo} ${o.año||''} — ${Object.keys(o.ficha).length} campos`.trim();\n  document.getElementById('ficha-body').innerHTML=Object.entries(o.ficha)\n    .map(([k,v])=>`<tr><td style=\"color:var(--muted);white-space:nowrap\">${k}<\u002Ftd><td>${v}<\u002Ftd><\u002Ftr>`).join('');\n  document.getElementById('ficha-bg').classList.add('open');\n}\nfunction cerrarFicha(){\n  document.getElementById('ficha-bg').classList.remove('open');\n}\nfunction cerrarComentario(){\n  document.getElementById('coment-bg').classList.remove('open');\n}\nwindow.rotAlBI=function(marca,modelo){\n  // saltar al análisis BI con este marca/modelo ya filtrado\n  const tab=document.querySelector('.tab[data-view=\"bi\"]'); if(tab) tab.click();\n  setTimeout(()=>{\n    biInitSafe();\n    const sMa=document.getElementById('bi-marca');\n    const op=[...sMa.options].find(o=>o.value.toLowerCase()===marca.toLowerCase());\n    if(op){sMa.value=op.value; biMarca();\n      const sMo=document.getElementById('bi-modelo');\n      const om=[...sMo.options].find(o=>o.value.toLowerCase()===modelo.toLowerCase());\n      if(om){sMo.value=om.value; biGens();}\n      biRender();\n      window.scrollTo({top:0,behavior:'smooth'});\n    }\n  },120);\n};\nwindow.biInitSafe=function(){ try{ if(typeof biInit==='function') biInit(); }catch(e){} };\nwindow._opAnios=new Set();\nwindow.opAnioPanel=function(ev){\n  ev.stopPropagation();\n  const p=document.getElementById('op-anio-panel');\n  if(p.style.display==='none'){\n    const g=document.getElementById('op-anio-grid');\n    if(!g.children.length){\n      const hoy=new Date().getFullYear();\n      let h='';\n      for(let y=hoy;y>=1990;y--) h+=`<button data-y=\"${y}\" onclick=\"opAnioToggle(event,${y})\" style=\"padding:4px 2px;border:1px solid var(--line);borde
