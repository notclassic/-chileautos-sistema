':'<span class=\"badge b-auto\">Automotora<\u002Fspan>')+(o.region?`<br><small style=\"color:var(--muted)\">${o.region}${o.comuna?' · '+o.comuna:''}<\u002Fsmall>`:'');\n    const aviso=o.url?`<a class=\"link-btn\" target=\"_blank\" rel=\"noopener\" href=\"${o.url}\">Ver ↗<\u002Fa>`:'—';\n    const alerta=o.bandera_roja?'(!) ':'';\n    const fresco=(o.dias_publicado!=null&&o.dias_publicado<=3)?'<span style=\"background:var(--good,#16a34a);color:#fff;border-radius:5px;padding:1px 6px;font-size:10px;margin-right:5px;vertical-align:middle\">'+(o.dias_publicado===0?'HOY':o.dias_publicado+'d')+'<\u002Fspan>':'';\n    const traza=`Original vendedor: ${o.version_original||o.version||'—'}&#10;Tasada como: ${o.version_oficial?('OFICIAL: '+o.version_oficial):(o.tasada_como||'modelo completo')}${o.generacion?(' · gen '+o.generacion):''} · método: ${o.metodo||'—'}`.replace(/\"/g,'&quot;');\n    const veh=o.url?`${fresco}<a href=\"${o.url}\" target=\"_blank\" rel=\"noopener\" style=\"color:var(--ink);text-decoration:none\">${alerta}${o.marca} ${o.modelo}<\u002Fa><small title=\"${traza}\" style=\"cursor:help\">${o.version||''} · ${o.comparables} comp.<\u002Fsmall>`:`${alerta}${o.marca} ${o.modelo}<small title=\"${traza}\" style=\"cursor:help\">${o.version||''}<\u002Fsmall>`;\n    const descExtra = o.desc_extremo ? ` <span title=\"Descuento muy alto (>55%): puede ser una ganga real o un error de datos. Revisá el aviso y los comparables antes de decidir.\" style=\"cursor:help\">🔍<\u002Fspan>` : '';\n    const desc=o.descuento==null?'—':(o.descuento>=0?`<span class=\"badge b-gold\">−${o.descuento}%<\u002Fspan>${descExtra}`:`<span class=\"badge b-warn\">+${Math.abs(o.descuento)}%<\u002Fspan>`);\n    const w=Math.round(40*(o.mercado||0)/maxMkt)+3;\n    const filaBg=o.bandera_roja?' style=\"background:rgba(224,54,79,.05)\"':'';\n    return `<tr${filaBg}>\n      <td class=\"veh\">${veh}<\u002Ftd>\n      <td class=\"num\">${f0(o.mercado||0)}<\u002Ftd>\n      <td class=\"num\">${o.año}${o.gens_pos?` <span title=\"Año de transición (${o.gens_pos}): la generación es ambigua — abrí el aviso, mirá las fotos y confirmala en el modal de comparables\">±<\u002Fspan>`:''}<\u002Ftd>\n      <td class=\"num\">${o.primera_vez?`<span title=\"Detectado el ${o.primera_vez}\">${o.primera_vez.slice(8,10)}-${o.primera_vez.slice(5,7)}<\u002Fspan>`:'—'}${o.dias_publicado!=null?`<br><small style=\"color:${o.dias_publicado>=30?'var(--good,#3a9d5d)':'var(--muted)'}\" title=\"${o.dias_publicado>=30?'lleva tiempo en venta, probablemente más negociable':'aviso reciente'}\">${o.dias_publicado===0?'hoy':'hace '+o.dias_publicado+'d'}<\u002Fsmall>`:''}<\u002Ftd>\n      <td class=\"num\">${f0(o.km)}<\u002Ftd>\n      <td class=\"num\">${fM(o.precio)}<\u002Ftd>\n      <td class=\"num\" style=\"color:var(--muted)\">${o.precio_justo?fM(o.precio_justo):'—'}${o.tasacion_pobre?` <span title=\"Tasación poco confiable: quedan menos de 5 comparables reales tras filtrar por versión/motor/tracción. El precio justo es orientativo — revisá los comparables antes de confiar en el descuento.\" style=\"cursor:help;color:var(--warn,#c0392b)\">(!)<\u002Fspan>`:''}<\u002Ftd>\n      <td class=\"num\">${desc}<\u002Ftd>\n      <td>${ent}<\u002Ftd>\n      <td style=\"white-space:normal;max-width:220px\">${chips(o.etiquetas, o.comentario?o.id:null)}${o.tiene_comentario?` <button class=\"comp-btn\" title=\"Ver comentario del vendedor\" onclick=\"verComentario('${o.id}')\">&#128172;<\u002Fbutton>`:''}${o.ficha?` <button class=\"comp-btn\" title=\"Ver ficha técnica oficial\" onclick=\"verFicha('${o.id}')\">&#128203;<\u002Fbutton>`:''}<\u002Ftd>\n      <td>${DATA.comps && DATA.comps[o.id] ? `<button class=\"comp-btn\" onclick=\"openComps('${o.id}')\">${o.comparables} comp. ↗<\u002Fbutton>` : '—'}<\u002Ftd>\n      <td>${aviso}<\u002Ftd>\n    <\u002Ftr>`;\n  }).join('');\n}\ndocument.querySelectorAll('#op-table thead th[data-k]').forEach(th=>{\n  th.style.cursor='pointer';\n  const base=th.textContent; th.dataset.base=base;\n  th.addEventListener('click',()=>{\n    const k=th.dataset.k;\n    if(window._opColSort && window._opColSort.key===k) window._opColSort.dir*=-1;\n    else window._opColSort={key:k,dir:1};\n    document.querySelectorAll('#op-table thead th[data-k]').forEach(x=>{x.textContent=x.dataset.base+' ⇅';});\n    th.textContent=base+(window._opColSort.dir>0?' ▲':' ▼');\n    renderOps();\n  });\n});\ndocument.getElementById('op-orden').addEventListener('change',()=>{\n  window._opColSort=null;\n  document.querySelectorAll('#op-table thead th[data-k]').forEach(x=>{x.textContent=x.dataset.base+' ⇅';});\n});\nrenderOps();\n\n// ================= MODAL COMPARABLES + recálculo =================\n// rows: [año, km_miles, precio, version, ent(P/A), self]\nconst opById = Object.fromEntries(ops.map(o=>[o.id,o]));\nlet modalState=null;\n\nfunction percentile(arr, p){\n  if(!arr.length) return NaN;\n  const a=[...arr].sort((x,y)=>x-y);\n  const i=(a.length-1)*p/100, lo=Math.floor(i), hi=Math.ceil(i);\n  return lo===hi ? a[lo] : a[lo]+(a[hi]-a[lo])*(i-lo);\n}\n// Réplica de la lógica Python de precio justo\n// Mismas tasas que el motor: normaliza cada comparable al año+km del target\n// y saca la mediana. Así el modal coincide con el precio justo del radar.\nconst ADJ_DEP_ANIO=0.065, ADJ_DEP_KM1000=0.0017, ADJ_PREF_KM=1.6;\nfunction fairFrom(rowsIncluded, kmObjetivoMiles, añoObjetivo){\n  const km=kmObjetivoMiles*1000;\n  const n=rowsIncluded.length;\n  if(n<5) return {val:null, method:'insuficiente', n};\n  // ajustar cada comparable al (año, km) del target\n  const adj=rowsIncluded.map(r=>{\n    const cAño=r[0], cKm=r[1]*1000, cPrecio=r[2];\n    const fAño=Math.pow(1-ADJ_DEP_ANIO, -((añoObjetivo||cAño)-cAño));\n    const fKm=Math.pow(1-ADJ_DEP_KM1000*ADJ_PREF_KM, (km-cKm)/1000);\n    let v=cPrecio*fAño*fKm;\n    return Math.min(Math.max(v, cPrecio*0.35), cPrecio*2.5);\n  });\n  // recorte de extremos y mediana\n  const lo=percentile(adj,5), hi=percentile(adj,95);\n  const sel=adj.filter(v=>v>=lo&&v<=hi);\n  const med=percentile(sel.length?sel:adj,50);\n  return {val:med, method:'ajuste', n};\n}\n\nfunction renderRecalc(){\n  const {op, rows, excluded}=modalState;\n  const inc=rows.filter((_,i)=>!excluded.has(i));\n  const fair=fairFrom(inc, Math.round(op.km/1000), op.año);\n  const origPj=op.precio_justo, origDesc=op.descuento;\n  let newPj=fair.val, newDesc = newPj!=null ? +(((newPj-op.precio)/newPj)*100).toFixed(1) : null;\n  const dInfo = m => (m&&m.startsWith('ajuste'))?'ajustado por año y km':m==='km_adj'?'ajustado por km':m==='mediana'?'mediana del grupo':(m&&m.startsWith('mediana'))?'mediana del grupo':m==='insuficiente'?'sin datos suficientes':'ajustado por año y km';\n  const arrow = (newDesc!=null && origDesc!=null)\n    ? (newDesc>origDesc?'<span style=\"color:var(--good)\">▲<\u002Fspan>':newDesc<origDesc?'<span style=\"color:var(--bad)\">▼<\u002Fspan>':'=')\n    : '';\n  document.getElementById('m-recalc').innerHTML=`\n    <div class=\"rc\"><div class=\"l\">Precio publicado<\u002Fdiv><div class=\"v\">${fM(op.precio)}<\u002Fdiv><div class=\"d\">${op.año} · ${f0(op.km)} km<\u002Fdiv><\u002Fdiv>\n    <div class=\"rc\"><div class=\"l\">Precio justo original<\u002Fdiv><div class=\"v\" style=\"color:var(--muted)\">${origPj?fM(origPj):'—'}<\u002Fdiv><div class=\"d\">${dInfo(op.metodo)} · ${op.comparables} comp.<\u002Fdiv><\u002Fdiv>\n    <div class=\"rc hl\"><div class=\"l\">Precio justo recalculado<\u002Fdiv><div class=\"v\">${newPj?fM(newPj):'—'}<\u002Fdiv><div class=\"d\">${dInfo(fair.method)} · ${inc.length} comp.<\u002Fdiv><\u002Fdiv>\n    <div class=\"rc\"><div class=\"l\">Descuento<\u002Fdiv><div class=\"v\">${newDesc!=null?(newDesc>=0?'−'+newDesc:'+'+Math.abs(newDesc))+'%':'—'} ${arrow}<\u002Fdiv><div class=\"d\">original ${origDesc!=null?(origDesc>=0?'−'+origDesc:'+'+Math.abs(origDesc))+'%':'—'}<\u002Fdiv><\u002Fdiv>`;\n  document.getElementById('m-foot-info').textContent =\n    `${excluded.size} excluido${excluded.size!==1?'s':''} de ${rows.length} comparables`;\n}\n\nfunction calcAjustado(r, op){\n  // VALOR DE MERCADO de un auto como el evaluado, en la condición de esta\n  // fila: parte del precio JUSTO (no del pedido, que puede ser la ganga).\n  const base=op.precio_justo; if(!base) return null;\n  const [año,kmM]=r;\n  const DEP=0.065, DKM=0.0017, PREF=1.6;\n  const fa=Math.pow(1-DEP, (op.año-año));\n  const fk=Math.pow(1-DKM*PREF, -((op.km-kmM*1000)/1000));\n  return Math.min(Math.max(base*fa*fk, base*0.35), base*2.5);\n}\nconst GEN_ORD={'I':1,'II':2,'III':3,'IV':4,'V':5};\nfunction renderCompTable(){\n  const {rows, excluded, op}=modalState;\n  const tb=document.querySelector('#m-table tbody');\n  // índices que pasan el filtro de año y generación\n  let idxs = rows.map((_,i)=>i).filter(i=>{\n    const r=rows[i];\n    if(r[5]) return true;  // el propio auto siempre se muestra\n    if(modalState.filtroAños.size && !modalState.filtroAños.has(r[0])) return false;\n    if(modalState.filtroGens.size && !modalState.filtroGens.has(r[7]||'—')) return false;\n    return true;\n  });\n  // ordenar\n  const k=modalState.sortKey, dir=modalState.sortDir;\n  idxs.sort((a,b)=>{\n    const ra=rows[a], rb=rows[b];\n    if((ra[5]?1:0)!==(rb[5]?1:0)) return (rb[5]?1:0)-(ra[5]?1:0);  // el auto evaluado, fijo arriba\n    let va,vb;\n    if(k==='año'){va=ra[0];vb=rb[0];}\n    else if(k==='km'){va=ra[1];vb=rb[1];}\n    else if(k==='kmanual'){va=(2026-ra[0])>0?ra[1]*1000/(2026-ra[0]):ra[1]*1000; vb=(2026-rb[0])>0?rb[1]*1000/(2026-rb[0]):rb[1]*1000;}\n    else if(k==='precio'){va=ra[2];vb=rb[2];}\n    else if(k==='ajustado'){va=calcAjustado(ra,op)??-1;vb=calcAjustado(rb,op)??-1;}\n    else if(k==='gen'){va=GEN_ORD[ra[7]]||99;vb=GEN_ORD[rb[7]]||99;}\n    else {va=ra[2];vb=rb[2];}\n    return (va-vb)*dir;\n  });\n  tb.innerHTML = idxs.map((i)=>{\n    const r=rows[i];\n    const [año,kmM,precio,ver,ent,self,cid,gen,gpos,kmDudoso,verOficial,curl]=r;\n    const kmAnual = (2026-año)>0 ? Math.round(kmM*1000/(2026-año)) : kmM*1000;\n    // Precio ajustado: lleva este comparable al año y km del auto evaluado,\n    // para compararlos en igualdad. Tasas DERIVADAS de la base chilena\n    // (234 modelos): ~6.5%/año y ~0.17% por cada 1000 km. Ambas multiplicativas.\n    // PREF_KM > 1 castiga más el km (preferencia por auto viejo con poco km).\n    const DEP_AÑO = 0.065;          // 6.5%/año (mercado real, no el 10% teórico)\n    const DEP_KM_1000 = 0.0017;     // 0.17% por cada 1000 km\n    const PREF_KM = 1.6;            // peso extra al km según tu criterio\n    const añoDif = (op.año - año);              // + si el evaluado es más nuevo\n    const kmDif = (op.km - kmM*1000);           // + si el evaluado tiene más km\n    // VALOR DE MERCADO de un auto como el evaluado, en la condición de esta\n    // fila. Base: el precio JUSTO del evaluado (no su precio pedido, que\n    // puede ser justamente la ganga y contaminaría toda la columna).\n    const baseJ = op.precio_justo || 0;\n    const factorAño = Math.pow(1 - DEP_AÑO, añoDif);\n    const factorKm = Math.pow(1 - DEP_KM_1000*PREF_KM, -kmDif/1000);\n    let ajust = baseJ * factorAño * factorKm;\n    if(baseJ) ajust = Math.min(Math.max(ajust, baseJ*0.35), baseJ*2.5);\n    const cls=[self?'self':'', excluded.has(i)?'excluded':''].filter(Boolean).join(' ');\n    let genCell = gen || '—';\n    if(gpos){\n      const btns = gpos.split('/').map(g=>\n        `<button class=\"comp-btn\" style=\"font-size:10px;padding:1px 5px\" title=\"Confirmar por fotos: es la generación ${g}\"\n          onclick=\"fijarGen('${cid}','${g}',this)\">${g}<\u002Fbutton>`).join(' ');\n      genCell = `<span title=\"Año de transición (${gpos}): abrí el aviso, mirá las fotos y confirmá la generación, o descartalo si es otra cosa\">±<\u002Fspan> ${btns}\n        <button class=\"comp-btn\" style=\"font-size:10px;padding:1px 5px\" title=\"Descartar este aviso del análisis (es otra versión/modelo)\"\n          onclick=\"descartarAviso('${cid}',${i},this)\">cerrar<\u002Fbutton>`;\n    }\n    return `<tr class=\"${cls}\">\n      <td><input type=\"checkbox\" ${excluded.has(i)?'':'checked'} onchange=\"toggleComp(${i})\" ${self?'disabled title=\"El auto evaluado siempre se incluye\"':''}><\u002Ftd>\n      <td class=\"num\">${año}<\u002Ftd>\n      <td class=\"num\">${f0(kmM*1000)}${kmDudoso===1?` <span title=\"Km sospechoso (auto con años pero casi sin km). Destildado por defecto para no ensuciar el cálculo — tildalo si creés que el km es real.\" style=\"cursor:help;color:var(--warn,#c0392b)\">(!)<\u002Fspan>`:''}<\u002Ftd>\n      <td class=\"num\" style=\"color:var(--muted)\">${f0(kmAnual)}<\u002Ftd>\n      <td class=\"num\">${fM(precio)}<\u002Ftd>\n      <td class=\"num\" style=\"color:${(Math.abs(añoDif)>=3||Math.abs(kmDif)>=80000)&&!self?'var(--muted)':'var(--signal,#3b82f6)'}\" title=\"${(Math.abs(añoDif)>=3||Math.abs(kmDif)>=80000)&&!self?'Extrapolación lejana ('+Math.abs(añoDif)+' años, '+f0(Math.abs(Math.round(kmDif)))+' km de diferencia): tomalo con pinzas':'Tu auto ('+op.año+', '+f0(op.km)+' km) si tuviera el año y km de esta fila. Compará contra el precio pedido de la fila.'}\">${self?(op.precio_justo?fM(op.precio_justo):'—'):(!op.precio_justo?'—':((Math.abs(añoDif)>=3||Math.abs(kmDif)>=80000)?'≈ ':'')+fM(Math.round(ajust)))}<\u002Ftd>\n      <td style=\"color:var(--muted);font-size:12px\" title=\"${ver||''}\">${(ver||'—')}\n        <button class=\"comp-btn\" style=\"font-size:10px;padding:0 4px;opacity:.6\" title=\"Corregir la versión de este aviso (vista en fotos/aviso)\"\n          onclick=\"corregirVersion('${cid}','${(ver||'').replace(/'/g,'')}',this)\">editar<\u002Fbutton><\u002Ftd>\n      <td style=\"color:var(--signal,#3b82f6);font-size:12px\" title=\"${verOficial||'sin ficha'}\">${verOficial?verOficial.toLowerCase():'—'}<\u002Ftd>\n      <td style=\"white-space:nowrap;font-size:12px\">${genCell}<\u002Ftd>\n      <td>${ent==='P'?'<span class=\"badge b-part\">Particular<\u002Fspan>':'<span class=\"badge b-auto\">Automotora<\u002Fspan>'}<\u002Ftd>\n      <td>${curl?`<a class=\"link-btn\" target=\"_blank\" rel=\"noopener\" href=\"${curl}\">ver<\u002Fa>`:'—'}<\u002Ftd>\n    <\u002Ftr>`;\n  }).join('');\n  // contador: cuántos comparables están INCLUIDOS (tildados) en el cálculo\n  const total=rows.filter(r=>!r[5]).length;         // sin contar el propio auto\n  const incluidos=rows.filter((r,i)=>!r[5] && !excluded.has(i)).length;\n  const vis=idxs.filter(i=>!rows[i][5]).length;      // visibles tras filtro\n  const fi=document.getElementById('m-foot-info');\n  if(fi) fi.innerHTML=`<b>${incluidos}<\u002Fb> de ${total} incluidos en el cálculo`\n    +(vis!==total?` · mostrando ${vis} (filtrados)`:'');\n}\n\nfunction renderFiltrosComp(){\n  const {rows}=modalState;\n  const años=[...new Set(rows.filter(r=>!r[5]).map(r=>r[0]))].sort((a,b)=>b-a);\n  const gens=[...new Set(rows.filter(r=>!r[5]).map(r=>r[7]||'—'))];\n  const cont=document.getElementById('m-filtros'); if(!cont) return;\n  const chipAño=a=>`<button onclick=\"toggleFiltroAño(${a})\" style=\"padding:3px 9px;border-radius:12px;cursor:pointer;font-size:11px;border:1px solid var(--line);background:${modalState.filtroAños.has(a)?'var(--accent,#2d7)':'var(--panel)'};color:${modalState.filtroAños.has(a)?'#fff':'inherit'}\">${a}<\u002Fbutton>`;\n  const chipGen=g=>`<button onclick=\"toggleFiltroGen('${g}')\" style=\"padding:3px 9px;border-radius:12px;cursor:pointer;font-size:11px;border:1px solid var(--line);background:${modalState.filtroGens.has(g)?'var(--signal,#3b82f6)':'var(--panel)'};color:${modalState.filtroGens.has(g)?'#fff':'inherit'}\">Gen ${g}<\u002Fbutton>`;\n  let html='<span style=\"color:var(--muted)\">Año:<\u002Fspan> '+años.map(chipAño).join(' ');\n  if(gens.length>1 && !(gens.length===1&&gens[0]==='—'))\n    html+=' &nbsp;<span style=\"color:var(--muted)\">Gen:<\u002Fspan> '+gens.filter(g=>g!=='—').map(chipGen).join(' ');\n  if(modalState.filtroAños.size||modalState.filtroGens.size)\n    html+=` &nbsp;<button onclick=\"limpiarFiltrosComp()\" style=\"padding:3px 9px;border-radius:12px;cursor:pointer;font-size:11px;border:1px solid var(--line);background:transparent;color:var(--warn,#c0392b)\">✕ limpiar<\u002Fbutton>`;\n  cont.innerHTML=html;\n}\nwindow.toggleFiltroAño=function(a){\n  if(modalState.filtroAños.has(a)) modalState.filtroAños.delete(a); else modalState.filtroAños.add(a);\n  renderFiltrosComp();\n  document.querySelectorAll('#m-table .msort').forEach(th=>{\n    th.onclick=()=>ordenarComp(th.dataset.sort);\n  }); renderCompTable(); renderRecalc();\n};\nwindow.toggleFiltroGen=function(g){\n  if(modalState.filtroGens.has(g)) modalState.filtroGens.delete(g); else modalState.filtroGens.add(g);\n  renderFiltrosComp(); renderCompTable(); renderRecalc();\n};\nwindow.limpiarFiltrosComp=function(){\n  modalState.filtroAños.clear(); modalState.filtroGens.clear();\n  renderFiltrosComp(); renderCompTable(); renderRecalc();\n};\nwindow.ordenarComp=function(k){\n  if(modalState.sortKey===k) modalState.sortDir*=-1;\n  else { modalState.sortKey=k; modalState.sortDir=(k==='año'||k==='gen')?1:-1; }\n  renderCompTable();\n};\n\nfunction guardarAviso(cid, cambio, btn, exito){\n  fetch(`${CTL_URL}/depurar_aviso`,{method:'POST',headers:{'Content-Type':'application/json'},\n    body:JSON.stringify({[cid]:cambio})})\n    .then(r=>{if(!r.ok)throw 0; btn.textContent='OK'; btn.disabled=true; if(exito)exito();})\n    .catch(()=>{btn.textContent='(!)'; btn.title='No pude guardar: ¿el panel está abierto? (PANEL.bat)';});\n}\nwindow.corregirVersion=function(cid, actual, btn){\n  // Versiones principales del modelo actual (del depurador) como sugerencias\n  const op = modalState ? modalState.op : null;\n  let sugeridas = [];\n  const keyDep = (!op && dbKey) ? dbKey : null;\n  if(op || keyDep){\n    const key = keyDep || (op.marca+'|'+op.modelo).toLowerCase();\n    const dm = (DATA.depurador_modelos||{})[key];\n    if(dm && dm.versiones){\n      sugeridas = dm.versiones\n        .filter(v=>v.identificada && v.n>=2)\n        .slice(0,14)\n        .map(v=>({txt:v.etiqueta, n:v.n}));\n    }\n  }\n  abrirSelectorVersion(cid, actual, sugeridas, btn);\n};\n\nfunction guardarAvisoLote(ids, cambio, btn){\n  const body={}; ids.forEach(id=>body[id]=cambio);\n  fetch(`${CTL_URL}/depurar_aviso`,{method:'POST',headers:{'Content-Type':'application/json'},\n    body:JSON.stringify(body)})\n    .then(r=>{if(!r.ok)throw 0; if(btn){btn.textContent='OK '+ids.length; btn.disabled=true;}\n      alert('Guardado en '+ids.length+' avisos. Aprete \"Clasificar + dashboard\" para aplicar.');})\n    .catch(()=>{if(btn){btn.textContent='!';} alert('No pude guardar: el panel (PANEL.bat) esta abierto?');});\n}\nfunction abrirSelectorVersion(cid, actual, sugeridas, btn, idsLote, filasLote){\n  // overlay con: versión del dueño, sugerencias del modelo, y campo libre\n  const ov=document.createElement('div');\n  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;display:flex;align-items:center;justify-content:center';\n  const box=document.createElement('div');\n  box.style.cssText='background:var(--bg,#fff);border-radius:14px;padding:20px;max-width:520px;width:90%;max-height:80vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)';\n  // Marcar como ⭐ sugeridas las versiones que coinciden con palabras del\n  // texto del vendedor (ej: \"allure\" -> las Allure primero, resaltadas).\n  const palabras=(actual||'').toLowerCase().split(/[^a-záéíóúüñ0-9.]+/).filter(w=>w.length>=2);\n  const coincide=s=>{\n    const st=s.txt.toLowerCase();\n    return palabras.some(w=>st.includes(w));\n  };\n  sugeridas.sort((a,b)=>(coincide(b)?1:0)-(coincide(a)?1:0) || b.n-a.n);\n  const chips = sugeridas.length\n    ? sugeridas.map(s=>{\n        const match=coincide(s);\n        return `<button class=\"ver-sug\" data-v=\"${s.txt.replace(/\"/g,'&quot;')}\"\n        style=\"display:block;width:100%;text-align:left;margin:4px 0;padding:9px 12px;border:1px solid ${match?'var(--signal,#3b82f6)':'var(--line)'};border-radius:8px;background:${match?'rgba(59,130,246,.08)':'var(--panel)'};cursor:pointer;font-size:13px\">\n        ${match?'⭐ ':''}${s.txt} <span style=\"color:var(--muted)\">· ${s.n} avisos<\u002Fspan>${match?' <span style=\"color:var(--signal,#3b82f6);font-size:11px\">coincide con lo que escribió<\u002Fspan>':''}<\u002Fbutton>`;\n      }).join('')\n    : '<div style=\"color:var(--muted);font-size:13px\">El sistema no tiene versiones sugeridas para este modelo todavía.<\u002Fdiv>';\n  box.innerHTML=`\n    <div style=\"font-size:16px;font-weight:600;margin-bottom:4px\">${idsLote?('Corregir versión de '+idsLote.length+' avisos (en lote)'):'Corregir versión de este aviso'}<\u002Fdiv>\n    ${filasLote&&filasLote.length?`<div style=\"max-height:180px;overflow:auto;border:1px solid var(--line);border-radius:8px;margin:6px 0;font-size:11px\">\n      <table style=\"width:100%;border-collapse:collapse\">\n        <thead><tr style=\"color:var(--muted);text-align:left\"><th style=\"padding:3px 8px\">Año<\u002Fth><th style=\"padding:3px 8px\">Km<\u002Fth><th style=\"padding:3px 8px\">Precio<\u002Fth><th style=\"padding:3px 8px\">Comentario<\u002Fth><th style=\"padding:3px 8px\">Aviso<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>${filasLote.map(f=>`<tr style=\"border-top:1px solid var(--line)\">\n          <td style=\"padding:3px 8px\">${f[2]||''}<\u002Ftd>\n          <td style=\"padding:3px 8px\">${f[5]?f0(f[5]*1000):'—'}<\u002Ftd>\n          <td style=\"padding:3px 8px\">${f[6]?fM(f[6]):'—'}<\u002Ftd>\n          <td style=\"padding:3px 8px;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap\" title=\"${esc(f[11])}\">${esc((f[11]||'').slice(0,40))}<\u002Ftd>\n          <td style=\"padding:3px 8px\">${f[13]?`<a target=\"_blank\" rel=\"noopener\" href=\"${f[13]}\" style=\"color:var(--signal,#3b82f6)\">ver<\u002Fa>`:'—'}<\u002Ftd>\n        <\u002Ftr>`).join('')}<\u002Ftbody><\u002Ftable><\u002Fdiv>`:''}\n    <div style=\"font-size:12px;color:var(--muted);margin-bottom:12px\">Lo que escribió el vendedor: <b style=\"color:var(--ink)\">${actual||'(vacío)'}<\u002Fb><\u002Fdiv>\n    <div style=\"font-size:12px;font-weight:600;margin-bottom:6px\">Versiones de este modelo (elegí la que corresponde según las fotos):<\u002Fdiv>\n    ${chips}\n    <div style=\"font-size:12px;font-weight:600;margin:14px 0 4px\">O escribila a mano:<\u002Fdiv>\n    <input id=\"ver-libre\" type=\"text\" value=\"${(actual||'').replace(/\"/g,'&quot;')}\"\n      style=\"width:100%;padding:9px;border:1px solid var(--line);border-radius:8px;background:var(--panel);font-size:13px\">\n    <div style=\"display:flex;gap:8px;justify-content:flex-end;margin-top:16px\">\n      <button id=\"ver-cancel\" class=\"vbtn\">Cancelar<\u002Fbutton>\n      <button id=\"ver-ok\" class=\"vbtn primary\">Guardar<\u002Fbutton>\n    <\u002Fdiv>`;\n  ov.appendChild(box); document.body.appendChild(ov);\n  const cerrar=()=>ov.remove();\n  ov.addEventListener('click',e=>{if(e.target===ov)cerrar();});\n  box.querySelector('#ver-cancel').onclick=cerrar;\n  box.querySelectorAll('.ver-sug').forEach(b=>{\n    b.onclick=()=>{ box.querySelector('#ver-libre').value=b.dataset.v; };\n  });\n  box.querySelector('#ver-ok').onclick=()=>{\n    const v=box.querySelector('#ver-libre').value.trim();\n    if(v){\n      if(idsLote && idsLote.length) guardarAvisoLote(idsLote, {version:v}, btn);\n      else if(v!==actual) guardarAviso(cid, {version:v}, btn);\n    }\n    cerrar();\n  };\n}\nwindow.fijarGen=function(cid, g, btn){\n  guardarAviso(cid, {gen:g}, btn, ()=>{\n    btn.parentElement.querySelectorAll('button').forEach(b=>{if(b!==btn)b.style.opacity=.35;});\n  });\n};\nwindow.descartarAviso=function(cid, i, btn){\n  guardarAviso(cid, {excluir:true}, btn, ()=>{\n    if(modalState && !modalState.rows[i][5]){ modalState.excluded.add(i); renderCompTable(); renderRecalc(); }\n  });\n};\nwindow.toggleComp=function(i){\n  if(modalState.rows[i][5]) return; // self no se excluye\n  if(modalState.excluded.has(i)) modalState.excluded.delete(i); else modalState.excluded.add(i);\n  renderCompTable(); renderRecalc();\n};\n\nfunction irAArreglarVersiones(marca, modelo){\n  // cerrar modal, cambiar a pestaña Arreglar versiones y precargar el modelo\n  document.getElementById('modal').style.display='none';\n  document.querySelector('.tab[data-view=\"versiones\"]').click();\n  setTimeout(()=>{\n    const selMa=document.getElementById('vm-marca');\n    // buscar la marca (capitalizada) en el selector\n    const maCap=[...selMa.options].find(o=>o.value.toLowerCase()===marca.toLowerCase());\n    if(maCap){ selMa.value=maCap.value; vmMarca();\n      setTimeout(()=>{\n        const selMo=document.getElementById('vm-modelo');\n        const moCap=[...selMo.options].find(o=>o.textContent.toLowerCase().startsWith(modelo.toLowerCase()));\n        if(moCap){ selMo.value=moCap.value; vmCargar(); }\n      },100);\n    }\n  },100);\n}\nwindow.openComps=function(id){\n  const op=opById[id], c=DATA.comps[id];\n  if(!c) return;\n  const ex=new Set(op._excluded||[]);\n  // Los comparables con km dudoso arrancan DESTILDADOS: no ensucian el\n  // cálculo del precio justo, pero se ven y podés tildarlos si querés.\n  // (Solo la primera vez que abrís; si ya guardaste una selección, se respeta.)\n  if(!op._excluded){\n    c.rows.forEach((r,i)=>{ if(r[9]===1 && r[5]!==1) ex.add(i); });  // r[9]=km_dudoso, r[5]=self\n  }\n  // Si el km publicado es dudoso, el motor calculó con el km típico de sus\n  // comparables: usar ese mismo km en todo el modal y AVISARLO.\n  let notaKm='';\n  if(op.km_norm && Math.abs(op.km_norm-op.km)>1000){\n    notaKm=` · (!) km publicado (${f0(op.km)}) dudoso: cálculos hechos con km típico ~${f0(Math.round(op.km_norm/1000)*1000)}`;\n    op=Object.assign({},op,{km:op.km_norm});\n  }\n  modalState={op, rows:c.rows, excluded:ex, full:c.n,\n              sortKey:'precio', sortDir:-1, filtroAños:new Set(), filtroGens:new Set()};\n  document.getElementById('m-title').textContent=`${op.marca} ${op.modelo} · comparables`;\n  renderFiltrosComp();\n  const btnFix=document.getElementById('m-fix-ver');\n  if(btnFix){ btnFix.onclick=()=>irAArreglarVersiones(op.marca, op.modelo); }\n  const capNote = c.n>c.rows.length ? ` (muestra de ${c.rows.length} de ${c.n})` : '';\n  document.getElementById('m-sub').textContent=\n    `Avisos del mismo modelo entre ${op.año-3} y ${op.año+3}${capNote}. Destildá los que no correspondan y mirá cómo cambia el precio justo.` + notaKm;\n  renderCompTable(); renderRecalc();\n  document.getElementById('modal-bg').classList.add('open');\n};\nfunction closeModal(){document.getElementById('modal-bg').classList.remove('open');modalState=null;}\ndocument.getElementById('m-close').addEventListener('click',closeModal);\ndocument.getElementById('modal-bg').addEventListener('click',e=>{if(e.target.id==='modal-bg')closeModal();});\ndocument.getElementById('coment-bg').addEventListener('click',e=>{if(e.target.id==='coment-bg')cerrarComentario();});\ndocument.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});\ndocument.getElementById('m-reset').addEventListener('click',()=>{\n  if(modalState){modalState.excluded.clear();renderCompTable();renderRecalc();}\n});\ndocument.getElementById('m-save').addEventListener('click',()=>{\n  if(!modalState)return;\n  const {op,rows,excluded}=modalState;\n  const inc=rows.filter((_,i)=>!excluded.has(i));\n  const fair=fairFrom(inc, Math.round(op.km/1000), op.año);\n  op.precio_justo = fair.val!=null ? Math.round(fair.val) : null;\n  op.descuento = (fair.val!=null) ? +(((fair.val-op.precio)/fair.val)*100).toFixed(1) : null;\n  op.comparables = inc.length;\n  op.metodo = fair.method;\n  op._excluded = [...excluded];\n  op._editado = true;\n  closeModal();\n  renderTable();\n});\n\n<\u002Fscript>\n<script>\n// --- Barra de control: habla con panel.py en localhost:8777 ---\nconst CTL_URL='http://localhost:8777';\nfunction ctlMsg(txt, cls){\n  const m=document.getElementById('ctl-msg');\n  m.textContent=txt; m.className=cls||'';\n  if(txt) setTimeout(()=>{m.textContent='';m.className='';}, 8000);\n}\nasync function cargarRelleno(){\n  const chk=document.getElementById('ctl-relleno');\n  const txt=document.getElementById('ctl-relleno-txt');\n  if(!chk) return;\n  try{\n    const r=await fetch(`${CTL_URL}/relleno_estado`); if(!r.ok) throw 0;\n    const e=await r.json();\n    chk.checked=!!e.activo; chk.disabled=false;\n    txt.textContent=e.activo?'Activado':'En stand by';\n  }catch(_){ chk.disabled=true; txt.textContent='(abrí PANEL.bat para controlarlo)'; }\n}\nfunction setRelleno(chk){\n  const txt=document.getElementById('ctl-relleno-txt');\n  fetch(`${CTL_URL}/relleno_set?on=${chk.checked?1:0}`)\n    .then(r=>{ if(!r.ok) throw 0;\n      txt.textContent=chk.checked?'Activado':'En stand by';\n      ctlMsg(chk.checked?'✓ Relleno histórico activado':'✓ Relleno histórico en stand by','ok'); })\n    .catch(()=>{ chk.checked=!chk.checked; ctlMsg('El panel no está corriendo: abrí PANEL.bat primero.','err'); });\n}\nfunction ctl(accion, btn){\n  if(accion==='regenerar'){\n    const bajando=document.getElementById('ctl-bajar') && document.getElementById('ctl-bajar').disabled;\n    if(bajando && !confirm('Hay una bajada de base EN CURSO.\\n\\nSi regenerás ahora, el dashboard saldrá con datos a medias. Lo recomendado es esperar a que el banner desaparezca (la bajada regenera todo sola al final).\\n\\n¿Regenerar igual?')) return;\n    ctlMsg('Regenerando: cuando la ventana termine, apretá Ctrl+F5 para ver el dashboard nuevo.','ok');\n  }\n  const lim=document.getElementById('ctl-limite').value||300;\n  const tel=document.getElementById('ctl-tel').checked?1:0;\n  fetch(`${CTL_URL}/lanzar?a=${accion}&limite=${lim}&tel=${tel}`)\n    .then(r=>{ if(!r.ok) throw 0;\n      ctlMsg('✓ lanzado — mirá la ventana de consola. Al terminar, recargá esta página.','ok');})\n    .catch(()=>ctlMsg('El panel no está corriendo: abrí PANEL.bat primero.','err'));\n}\n// Estado de la descarga: \"bajando\" / \"última base descargada\"\nasync function estadoPanel(){\n  const st=document.getElementById('ctl-status');\n  const btn=document.getElementById('ctl-bajar');\n  try{\n    const r=await fetch(`${CTL_URL}/estado`); if(!r.ok) throw 0;\n    const e=await r.json();\n    if(e.en_curso){\n      st.className='stq run';\n      st.innerHTML='⏳ Bajando'+(e.etapa&&e.etapa!=='listo'?' — etapa '+e.etapa:'…')+' (desde '+e.inicio+') '\n        +'<button class=\"cbtn sec\" style=\"font-size:11px;padding:2px 8px;margin-left:6px\" '\n        +'onclick=\"detenerCorrida(this)\">Detener<\u002Fbutton>'\n        +' <button class=\"cbtn\" style=\"padding:3px 10px;font-size:11px\" title=\"Borra la marca de corrida colgada sin tocar procesos. Usalo cuando el banner queda pegado tras un error.\" onclick=\"limpiarMarca(this)\">Limpiar marca<\u002Fbutton>';\n      btn.disabled=true;\n    }else if(e.colgada){\n      st.className='stq warn';\n      st.innerHTML='(!) La corrida iniciada '+e.inicio+' quedó en '+(e.etapa&&e.etapa!=='listo'?('la etapa '+e.etapa):'una etapa intermedia')+'. '\n        +'<button class=\"cbtn\" style=\"font-size:11px;padding:3px 10px;margin-left:6px\" '\n        +'title=\"Retoma la cadena exactamente desde la etapa pendiente, sin repetir lo ya hecho.\" '\n        +'onclick=\"continuarBajada(this)\">Continuar donde quedó<\u002Fbutton>'\n        +' <button class=\"cbtn sec\" style=\"font-size:11px;padding:2px 8px;margin-left:6px\" '\n        +'onclick=\"descartarCorrida(this)\">Descartar aviso<\u002Fbutton>';\n      btn.disabled=false;\n    }else{\n      st.className='stq done';\n      st.textContent=e.ultima ? ('Última base descargada: '+e.ultima) : 'Sin descargas registradas aún';\n      btn.disabled=false;\n    }\n  }catch(_){ st.className='stq'; st.textContent=''; }\n}\nwindow.continuarBajada=function(b){\n  b.disabled=true;\n  fetch(`${CTL_URL}/lanzar?a=continuar&limite=800&tel=0`).then(r=>{if(!r.ok)throw 0;return r.text();})\n    .then(()=>{ctlMsg('Retomando la bajada desde la etapa pendiente…','ok'); setTimeout(()=>location.reload(),1500);})\n    .catch(()=>{b.disabled=false; ctlMsg('No pude continuar: ¿el panel (PANEL.bat) está abierto?','err');});\n};\nwindow.limpiarMarca=function(b){\n  b.disabled=true;\n  fetch(`${CTL_URL}/descartar_corrida`)\n    .then(r=>{if(!r.ok)throw 0; ctlMsg('Marca limpiada: el banner desaparece en unos segundos.','ok'); setTimeout(()=>location.reload(),1500);})\n    .catch(()=>{b.disabled=false; ctlMsg('No pude limpiar: ¿el panel (PANEL.bat) está abierto?','err');});\n};\nfunction detenerCorrida(b){\n  if(!confirm('¿Detener la corrida en curso?\\n\\nLo ya descargado queda guardado; podés retomar después con los botones de Más opciones.')) return;\n  b.disabled=true; b.textContent='…';\n  fetch(`${CTL_URL}/detener_corrida`)\n    .then(r=>{ if(!r.ok) throw 0;\n      ctlMsg('✓ Corrida detenida. Lo descargado quedó guardado.','ok');\n      estadoPanel(); })\n    .catch(()=>{ b.disabled=false; b.textContent='Detener';\n      ctlMsg('El panel no está corriendo: abrí PANEL.bat primero.','err'); });\n}\nfunction descartarCorrida(b){\n  b.disabled=true; b.textContent='…';\n  fetch(`${CTL_URL}/descartar_corrida`)\n    .then(r=>{ if(!r.ok) throw 0;\n      ctlMsg('✓ Aviso descartado. Ya podés lanzar una corrida nueva.','ok');\n      estadoPanel(); })\n    .catch(()=>{ b.disabled=false; b.textContent='Descartar aviso';\n      ctlMsg('El panel no está corriendo: abrí PANEL.bat primero.','err'); });\n}\nsetInterval(estadoPanel, 15000); estadoPanel();\n\n// --- Pestaña Mercado ---\n(function renderMercado(){\n  const kpis=document.getElementById('mkt-kpis'); if(!kpis) return;\n  const r=DATA.resumen||{}, a=DATA.analisis||{};\n  const card=(l,v,sub)=>`<div style=\"background:var(--panel);border:1px solid var(--line);border-radius:10px;\n      padding:12px 18px;min-width:140px\"><div style=\"font-size:11px;color:var(--muted);font-family:var(--mono);\n      text-transform:uppercase\">${l}<\u002Fdiv><div style=\"font-size:20px;font-weight:700\">${v}<\u002Fdiv>${sub?`<div style=\"font-size:11px;color:var(--muted)\">${sub}<\u002Fdiv>`:''}<\u002Fdiv>`;\n  kpis.innerHTML=[card('Avisos activos',f0(r.total||0)),card('Precio mediano',fM(r.precio_mediano||0)),\n    card('Oportunidades oro',f0(r.op_oro||0)),card('Bajo precio',f0(r.op_precio||0)),card('Bajo km',f0(r.op_km||0))].join('');\n\n  // barra horizontal reusable\n  const barra=(label,val,max,color,txt)=>{\n    const w=Math.max(2,Math.round(100*val/(max||1)));\n    return `<div style=\"display:flex;align-items:center;gap:10px;margin:3px 0;font-size:13px\">\n      <div style=\"width:190px;text-align:right;color:var(--ink)\">${label}<\u002Fdiv>\n      <div style=\"flex:1;background:var(--line);border-radius:5px;height:20px;position:relative;max-width:420px\">\n        <div style=\"width:${w}%;background:${color};height:100%;border-radius:5px\"><\u002Fdiv><\u002Fdiv>\n      <div style=\"width:130px;color:var(--muted)\">${txt}<\u002Fdiv><\u002Fdiv>`;\n  };\n\n  // 1. ALERTAS\n  const al=a.alertas||[];\n  document.getElementById('mkt-alertas').innerHTML = al.length\n    ? al.slice(0,10).map(x=>barra(`${x.marca} ${x.modelo}`, x.pct_nuevos, 100, 'var(--warn,#c0392b)',\n        `${x.pct_nuevos}% son 0-1 año · ${x.avisos} avisos`)).join('')\n    : '<p class=\"lead\">Sin modelos con exceso de autos casi nuevos a la venta. (Buena señal general.)<\u002Fp>';\n\n  // 2. DEPRECIACIÓN — mostrar los que MÁS deprecian (mejores compras usadas)\n  const dp=a.depreciacion||[];\n  const maxP = Math.max(...dp.map(x=>x.perdida_3a), 1);\n  document.getElementById('mkt-deprec').innerHTML = dp.length\n    ? `<div style=\"font-size:12px;color:var(--muted);margin-bottom:6px\">Ordenado por mayor depreciación (mejor oportunidad de compra usada):<\u002Fdiv>`\n      + dp.slice(0,12).map(x=>barra(x.marca, x.perdida_3a, maxP,\n          x.perdida_3a>=45?'var(--good,#3a9d5d)':'var(--signal,#3b82f6)',\n          `pierde ${x.perdida_3a}% · retiene ${x.retiene_3a}%`)).join('')\n    : '<p class=\"lead\">Faltan datos de precio 0a vs 3a para calcular depreciación.<\u002Fp>';\n\n  // 3. SEGMENTOS\n  const sg=a.segmentos||[];\n  const maxS=Math.max(...sg.map(x=>x.pct_oro),1);\n  const nombreSeg={suv:'SUV',pickup:'Pickup / Utilitario',city:'City car / Compacto'};\n  document.getElementById('mkt-seg').innerHTML = sg.length\n    ? sg.map(x=>barra(nombreSeg[x.segmento]||x.segmento, x.pct_oro, maxS, 'var(--gold,#c79a3a)',\n        `${x.pct_oro}% oro · ${x.oro} de ${f0(x.avisos)}`)).join('')\n    : '<p class=\"lead\">Sin segmentos con volumen suficiente.<\u002Fp>';\n\n  // 4. PANORAMA POR MARCA (tabla ordenable)\n  let marcas=(a.por_marca||[]).slice();\n  let mkSort={k:'avisos',dir:-1};\n  function pintarMarcas(){\n    marcas.sort((x,y)=>{const va=x[mkSort.k],vb=y[mkSort.k];\n      return (va<vb?-1:va>vb?1:0)*mkSort.dir;});\n    document.getElementById('mkt-marca').innerHTML=marcas.slice(0,40).map(x=>\n      `<tr><td>${x.marca}<\u002Ftd><td class=\"num\">${f0(x.avisos)}<\u002Ftd>\n       <td class=\"num\">${fM(x.precio_med)}<\u002Ftd><td class=\"num\">${x.antiguedad_med} años<\u002Ftd>\n       <td class=\"num\">${f0(x.km_med)}<\u002Ftd><td class=\"num\">${x.pct_particular}%<\u002Ftd><\u002Ftr>`).join('');\n  }\n  document.querySelectorAll('#mkt-marca-tbl thead th[data-mk]').forEach(th=>{\n    th.style.cursor='pointer';\n    th.addEventListener('click',()=>{const k=th.dataset.mk;\n      if(mkSort.k===k)mkSort.dir*=-1; else mkSort={k,dir:k==='marca'?1:-1}; pintarMarcas();});\n  });\n  pintarMarcas();\n\n  const caps=(DATA.capturas||[]);\n  document.getElementById('mkt-nota').innerHTML =\n    `Análisis sobre ${f0(r.total||0)} avisos activos · ${(a.por_marca||[]).length} marcas con volumen. `\n    + (caps.length<2 ? 'La rotación (días de venta) necesita 2+ fechas de captura para activarse.'\n       : `Rotación disponible con ${caps.length} fechas.`);\n})();\n\n// --- Pestaña Depuración BBDD ---\n// ===== Arreglar versiones por modelo =====\nconst DM = (DATA.depurador_modelos||{});\nconst vmCambios = {};   // clave_modelo -> {fusiones:[[claves]], renombres:{clave:txt}, excluidas:[claves]}\nlet vmSeleccion = new Set();\n\nfunction vmInit(){\n  const sel=document.getElementById('vm-marca'); if(!sel) return;\n  const marcas=[...new Set(Object.values(DM).map(m=>m.marca))].sort();\n  sel.innerHTML='<option value=\"\">—<\u002Foption>'+marcas.map(m=>`<option>${m}<\u002Foption>`).join('');\n}\nfunction vmMarca(){\n  const ma=document.getElementById('vm-marca').value;\n  const mods=Object.values(DM).filter(m=>m.marca===ma)\n    .sort((a,b)=>b.total-a.total).map(m=>({mo:m.modelo,n:m.total}));\n  document.getElementById('vm-modelo').innerHTML='<option value=\"\">—<\u002Foption>'\n    +mods.map(m=>`<option>${m.mo} (${m.n})<\u002Foption>`).join('');\n  document.getElementById('vm-lista').innerHTML='';\n  document.getElementById('vm-resumen').textContent='';\n}\nfunction vmClaveModelo(){\n  const ma=document.getElementById('vm-marca').value;\n  const moRaw=document.getElementById('vm-modelo').value;\n  const mo=moRaw.replace(/\\s*\\(\\d+\\)\\s*$/,'');\n  const entry=Object.entries(DM).find(([k,v])=>v.marca===ma && v.modelo===mo);\n  return entry?entry[0]:null;\n}\nfunction vmCargar(){\n  vmSeleccion.clear();\n  const k=vmClaveModelo(); if(!k){document.getElementById('vm-lista').innerHTML='';return;}\n  const m=DM[k];\n  const cambios=vmCambios[k]||{fusiones:[],renombres:{},excluidas:[]};\n  const ident=m.versiones.filter(v=>v.identificada).length;\n  document.getElementById('vm-resumen').innerHTML=\n    `<b>${m.total}<\u002Fb> avisos · <b>${m.n_versiones}<\u002Fb> versiones propuestas · `\n    +`${ident} identificadas, ${m.n_versiones-ident} sin identificar (revisá esas primero)`;\n  document.getElementById('vm-lista').innerHTML=m.versiones.map((v,i)=>{\n    const excl=(cambios.excluidas||[]).includes(v.clave);\n    const nombre=(cambios.renombres||{})[v.clave]||v.etiqueta;\n    const añosTxt=v.años?`${v.años[0]}–${v.años[1]}`:'—';\n    const precAño=Object.entries(v.precio_año||{}).map(([a,p])=>\n      `<span style=\"display:inline-block;margin:2px 8px 2px 0;font-size:11px;color:var(--muted)\">${a}: ${fM(p)}<\u002Fspan>`).join('');\n    const avisos=v.avisos.slice(0,40).map(av=>\n      `<tr><td class=\"num\">${av.año||'—'}<\u002Ftd><td class=\"num\">${av.km!=null?f0(av.km):'—'}<\u002Ftd>\n        <td class=\"num\">${av.precio!=null?fM(av.precio):'—'}<\u002Ftd>\n        <td>${av.ent==='P'?'<span class=\"badge b-part\">Part<\u002Fspan>':'<span class=\"badge b-auto\">Auto<\u002Fspan>'}<\u002Ftd>\n        <td style=\"font-size:11px;color:var(--muted)\">${av.texto}<\u002Ftd>\n        <td>${av.url?`<a class=\"link-btn\" target=\"_blank\" href=\"${av.url}\">ver<\u002Fa>`:'—'}<\u002Ftd><\u002Ftr>`).join('');\n    return `<div style=\"border:1px solid var(--line);border-radius:10px;margin-bottom:10px;overflow:hidden;${excl?'opacity:.5':''}\">\n      <div style=\"display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--panel)\">\n        <input type=\"checkbox\" onchange=\"vmToggleSel('${v.clave}',this)\" title=\"Marcar para fusionar con otra\">\n        <div style=\"flex:1\">\n          <input type=\"text\" value=\"${nombre.replace(/\"/g,'&quot;')}\" data-clave=\"${v.clave}\"\n            onchange=\"vmRenombrar('${k}','${v.clave}',this.value)\"\n            style=\"font-size:14px;font-weight:600;border:none;background:transparent;width:100%;color:var(--ink)\">\n          <div style=\"font-size:12px;color:var(--muted)\">${v.n} avisos · mediana ${fM(v.precio_med)} · años ${añosTxt} ${v.identificada?'':'· <span style=\\'color:var(--warn,#c0392b)\\'>(!) sin identificar<\u002Fspan>'}<\u002Fdiv>\n        <\u002Fdiv>\n        <button class=\"comp-btn\" onclick=\"vmExpandir(this)\" title=\"Ver los avisos\">${'▾ avisos'}<\u002Fbutton>\n        <button class=\"comp-btn\" onclick=\"vmExcluir('${k}','${v.clave}',this)\" title=\"Excluir esta versión del análisis\">${excl?'incluir':'excluir'}<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"padding:6px 14px 2px\">${precAño}<\u002Fdiv>\n      <div class=\"vm-avisos\" style=\"display:none;padding:0 14px 12px\">\n        <table class=\"tbl\" style=\"font-size:12px\"><thead><tr><th class=\"num\">Año<\u002Fth><th class=\"num\">Km<\u002Fth>\n          <th class=\"num\">Precio<\u002Fth><th>Vend.<\u002Fth><th>Texto original<\u002Fth><th>Aviso<\u002Fth><\u002Ftr><\u002Fthead>\n          <tbody>${avisos}<\u002Ftbody><\u002Ftable>\n      <\u002Fdiv>\n    <\u002Fdiv>`;\n  }).join('');\n}\nfunction vmExpandir(btn){\n  const box=btn.closest('div').parentElement.querySelector('.vm-avisos');\n  const vis=box.style.display!=='none';\n  box.style.display=vis?'none':'block'; btn.textContent=vis?'▾ avisos':'▴ ocultar';\n}\nfunction vmToggleSel(clave,chk){\n  if(chk.checked) vmSeleccion.add(clave); else vmSeleccion.delete(clave);\n  const btn=document.getElementById('vm-fusionar');\n  const info=document.getElementById('vm-fusion-info');\n  if(vmSeleccion.size>=2){ btn.style.display=''; info.textContent=`${vmSeleccion.size} versiones seleccionadas`; }\n  else { btn.style.display='none'; info.textContent=vmSeleccion.size===1?'Seleccioná otra para fusionar':''; }\n}\nfunction vmCambiosDe(k){ vmCambios[k]=vmCambios[k]||{fusiones:[],renombres:{},excluidas:[]}; return vmCambios[k]; }\nfunction vmRenombrar(k,clave,txt){ vmCambiosDe(k).renombres[clave]=txt; }\nfunction vmExcluir(k,clave,btn){\n  const c=vmCambiosDe(k); const i=c.excluidas.indexOf(clave);\n  if(i>=0){c.excluidas.splice(i,1);} else {c.excluidas.push(clave);}\n  vmCargar();\n}\nfunction vmFusionar(){\n  const k=vmClaveModelo(); if(!k||vmSeleccion.size<2) return;\n  const claves=[...vmSeleccion];\n  const nombre=window.prompt('Nombre de la versión unificada:',\n    DM[k].versiones.find(v=>v.clave===claves[0]).etiqueta);\n  if(!nombre) return;\n  const c=vmCambiosDe(k);\n  c.fusiones.push({claves, nombre});\n  claves.forEach(cl=>{ c.renombres[cl]=nombre; });\n  vmSeleccion.clear();\n  document.getElementById('vm-fusionar').style.display='none';\n  document.getElementById('vm-fusion-info').textContent='';\n  ctlMsg(`✓ ${claves.length} versiones marcadas para fusionar como \"${nombre}\". Guardá para aplicar.`,'ok');\n  vmCargar();\n}\nfunction vmGuardar(btn){\n  const k=vmClaveModelo();\n  if(!k||!vmCambios[k]){ ctlMsg('No hay cambios para guardar en este modelo.',''); return; }\n  btn.disabled=true;\n  fetch(`${CTL_URL}/depurar_versiones`,{method:'POST',headers:{'Content-Type':'application/json'},\n    body:JSON.stringify({modelo:k, cambios:vmCambios[k]})})\n    .then(r=>{ if(!r.ok) throw 0; btn.disabled=false;\n      ctlMsg('✓ Guardado. En el próximo \"Clasificar + dashboard\" se aplica.','ok'); })\n    .catch(()=>{ btn.disabled=false; ctlMsg('El panel no está corriendo: abrí PANEL.bat.','err'); });\n}\nfunction ctlMsg(txt,tipo){\n  const el=document.getElementById('vm-msg')||document.getElementById('ctl-status');\n  if(el){ el.textContent=txt; el.style.color=tipo==='err'?'var(--warn,#c0392b)':tipo==='ok'?'var(--good,#3a9d5d)':'var(--muted)'; }\n}\n// ===== Corregir generaciones por modelo =====\nconst GE = (DATA.generaciones_edit||{});\nlet gmRangosActual = [];   // [{gen,desde,hasta}]\nlet gmKeyActual = null;\n\nfunction gmInit(){\n  const sel=document.getElementById('gm-marca'); if(!sel) return;\n  const marcas=[...new Set(Object.values(GE).map(m=>m.marca))].sort();\n  sel.innerHTML='<option value=\"\">—<\u002Foption>'+marcas.map(m=>`<option>${m}<\u002Foption>`).join('');\n}\nfunction gmMarca(){\n  const ma=document.getElementById('gm-marca').value;\n  // modelos de esa marca, ordenados por total de avisos (suma del conteo)\n  const mods=Object.values(GE).filter(m=>m.marca===ma).map(m=>({\n    mo:m.modelo, n:Object.values(m.conteo||{}).reduce((a,b)=>a+b,0)\n  })).sort((a,b)=>b.n-a.n);\n  document.getElementById('gm-modelo').innerHTML='<option value=\"\">—<\u002Foption>'\n    +mods.map(m=>`<option>${m.mo} (${m.n})<\u002Foption>`).join('');\n  document.getElementById('gm-panel').style.display='none';\n}\nfunction gmKey(){\n  const ma=document.getElementById('gm-marca').value;\n  const moRaw=document.getElementById('gm-modelo').value;\n  const mo=moRaw.replace(/\\s*\\(\\d+\\)\\s*$/,'');\n  const entry=Object.entries(GE).find(([k,v])=>v.marca===ma && v.modelo===mo);\n  return entry?entry[0]:null;\n}\nfunction gmCargar(){\n  const k=gmKey(); gmKeyActual=k;\n  if(!k){document.getElementById('gm-panel').style.display='none';return;}\n  const info=GE[k];\n  gmRangosActual = (info.rangos||[]).map(r=>({gen:r.gen, desde:r.desde, hasta:r.hasta}));\n  document.getElementById('gm-panel').style.display='';\n  gmRenderRangos(info.conteo||{});\n  gmRenderAvisos(k);\n  document.getElementById('gm-msg').textContent='';\n}\nfunction gmRenderRangos(conteo){\n  const cont=document.getElementById('gm-rangos');\n  if(!gmRangosActual.length){ cont.innerHTML='<div style=\"color:var(--muted);font-size:13px\">Este modelo no tiene generaciones definidas. Agregá una con el botón de abajo.<\u002Fdiv>'; return; }\n  cont.innerHTML=`<table style=\"width:100%;border-collapse:collapse;font-size:13px\">\n    <thead><tr style=\"text-align:left;color:var(--muted);font-size:11px\">\n      <th style=\"padding:4px 8px\">Generación<\u002Fth><th style=\"padding:4px 8px\">Desde<\u002Fth>\n      <th style=\"padding:4px 8px\">Hasta<\u002Fth><th style=\"padding:4px 8px\">Avisos<\u002Fth><th><\u002Fth><\u002Ftr><\u002Fthead>\n    <tbody>${gmRangosActual.map((r,i)=>`\n      <tr>\n        <td style=\"padding:4px 8px\"><input value=\"${r.gen}\" onchange=\"gmEdit(${i},'gen',this.value)\" style=\"width:80px;padding:5px;border:1px solid var(--line);border-radius:6px;background:var(--panel)\"><\u002Ftd>\n        <td style=\"padding:4px 8px\"><input type=\"number\" value=\"${r.desde}\" onchange=\"gmEdit(${i},'desde',this.value)\" style=\"width:75px;padding:5px;border:1px solid var(--line);border-radius:6px;background:var(--panel)\"><\u002Ftd>\n        <td style=\"padding:4px 8px\"><input type=\"number\" value=\"${r.hasta==null?'':r.hasta}\" placeholder=\"actual\" onchange=\"gmEdit(${i},'hasta',this.value)\" style=\"width:75px;padding:5px;border:1px solid var(--line);border-radius:6px;background:var(--panel)\"><\u002Ftd>\n        <td style=\"padding:4px 8px;color:var(--muted)\">${conteo[r.gen]||0}<\u002Ftd>\n        <td style=\"padding:4px 8px\"><button onclick=\"gmBorrarRango(${i})\" title=\"Borrar\" style=\"background:none;border:none;color:var(--warn,#c0392b);cursor:pointer;font-size:15px\">×<\u002Fbutton><\u002Ftd>\n      <\u002Ftr>`).join('')}<\u002Ftbody><\u002Ftable>\n    <div style=\"font-size:11px;color:var(--muted);margin-top:6px\">Si dos generaciones se solapan en un año (cambio a mitad de año), dejá que los rangos se pisen — el sistema marcará ese año como ambiguo (±) para revisar por fotos.<\u002Fdiv>`;\n}\nfunction gmEdit(i,campo,val){\n  if(campo==='gen') gmRangosActual[i].gen=val.trim();\n  else gmRangosActual[i][campo] = val===''?null:parseInt(val,10);\n}\nfunction gmAgregarRango(){\n  gmRangosActual.push({gen:'', desde:new Date().getFullYear(), hasta:null});\n  gmRenderRangos(GE[gmKeyActual]?.conteo||{});\n}\nfunction gmBorrarRango(i){ gmRangosActual.splice(i,1); gmRenderRangos(GE[gmKeyActual]?.conteo||{}); }\nfunction gmGuardarRangos(btn){\n  const k=gmKeyActual; if(!k) return;\n  const info=GE[k];\n  // validar\n  for(const r of gmRangosActual){\n    if(!r.gen || r.desde==null){ document.getElementById('gm-msg').textContent='(!) cada rango necesita generación y año desde'; return; }\n  }\n  btn.disabled=true; btn.textContent='Guardando...';\n  fetch(`${CTL_URL}/guardar_generaciones`,{method:'POST',headers:{'Content-Type':'application/json'},\n    body:JSON.stringify({marca:info.marca, modelo:info.modelo, rangos:gmRangosActual})})\n    .then(r=>{if(!r.ok)throw 0;\n      document.getElementById('gm-msg').innerHTML='✓ guardado. Apretá \"Clasificar + dashboard\" para aplicar.';\n      btn.disabled=false; btn.textContent='Guardar cortes de años';})\n    .catch(()=>{document.getElementById('gm-msg').textContent='(!) no pude guardar (¿PANEL.bat abierto?)';\n      btn.disabled=false; btn.textContent='Guardar cortes de años';});\n}\nfunction gmRenderAvisos(k){\n  // buscar los avisos de este modelo en las oportunidades para poder corregir su gen\n  const info=GE[k];\n  const avisos=(DATA.oportunidades||[]).filter(o=>\n    (o.marca||'').toLowerCase()===info.marca && (o.modelo||'').toLowerCase()===info.modelo);\n  const cont=document.getElementById('gm-avisos');\n  if(!avisos.length){ cont.innerHTML='<div style=\"color:var(--muted);font-size:13px\">No hay avisos de este modelo en el radar de oportunidades. (Solo se pueden corregir desde acá los que aparecen como oportunidad; el resto, desde su modal de comparables.)<\u002Fdiv>'; return; }\n  const gens=[...new Set((info.rangos||[]).map(r=>r.gen))];\n  cont.innerHTML=`<table style=\"width:100%;border-collapse:collapse;font-size:12px\">\n    <thead><tr style=\"text-align:left;color:var(--muted);font-size:11px\">\n      <th style=\"padding:4px 8px\">Año<\u002Fth><th style=\"padding:4px 8px\">Versión<\u002Fth>\n      <th style=\"padding:4px 8px\">Gen actual<\u002Fth><th style=\"padding:4px 8px\">Corregir a<\u002Fth><\u002Ftr><\u002Fthead>\n    <tbody>${avisos.slice(0,60).map(o=>`\n      <tr>\n        <td style=\"padding:4px 8px\">${o.año}${o.gens_pos?' ±':''}<\u002Ftd>\n        <td style=\"padding:4px 8px;color:var(--muted)\">${(o.version||'—').slice(0,30)}<\u002Ftd>\n        <td style=\"padding:4px 8px\">${o.gen||'—'}<\u002Ftd>\n        <td style=\"padding:4px 8px\">${gens.map(g=>`<button onclick=\"guardarAviso('${o.id}',{gen:'${g}'},this)\" style=\"margin-right:4px;padding:3px 9px;border:1px solid var(--line);border-radius:6px;background:${o.gen===g?'var(--accent,#2d7)':'transparent'};cursor:pointer;font-size:11px\">${g}<\u002Fbutton>`).join('')}<\u002Ftd>\n      <\u002Ftr>`).join('')}<\u002Ftbody><\u002Ftable>`;\n}\n// ===== Depuración BBDD: tabla plana por modelo (spec del usuario) =====\nfunction esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/<\u002Fg,'&lt;').replace(/>/g,'&gt;').replace(/\"/g,'&quot;');}\nconst DEPU=(DATA.depuracion_avisos||{});\nconst FICHAS=(DATA.fichas_full||{});\nlet dbFiltroGens=new Set(), dbKey=null;\nfunction dbInit(){\n  const sel=document.getElementById('db-marca'); if(!sel) return;\n  const marcas=[...new Set(Object.keys(DEPU).map(k=>k.split('|')[0]))].sort();\n  sel.innerHTML='<option value=\"\">—<\u002Foption>'+marcas.map(m=>`<option>${m}<\u002Foption>`).join('');\n}\nfunction dbMarca(){\n  const ma=document.getElementById('db-marca').value;\n  const mods=Object.entries(DEPU).filter(([k])=>k.split('|')[0]===ma)\n    .map(([k,v])=>({mo:k.split('|')[1],n:v.length})).sort((a,b)=>b.n-a.n);\n  document.getElementById('db-modelo').innerHTML='<option value=\"\">—<\u002Foption>'\n    +mods.map(m=>`<option value=\"${m.mo}\">${m.mo} (${m.n})<\u002Foption>`).join('');\n  document.getElementById('db-tabla').innerHTML=''; dbKey=null;\n}\nfunction dbCargar(){\n  const ma=document.getElementById('db-marca').value;\n  const mo=document.getElementById('db-modelo').value;\n  dbKey=(ma&&mo)?`${ma}|${mo}`:null; dbFiltroGens.clear(); dbFiltroSel=null; dbGensRender(); dbResumen(); dbRender();\n}\nfunction dbGensRender(){\n  const cont=document.getElementById('db-gens'); if(!cont) return;\n  if(!dbKey){cont.innerHTML='';return;}\n  const gens=[...new Set(DEPU[dbKey].map(r=>r[1]||'—'))];\n  cont.innerHTML='<span style=\"color:var(--muted);font-size:12px\">Gen:<\u002Fspan> '+gens.map(g=>\n    `<button onclick=\"dbToggleGen('${g}')\" style=\"padding:3px 9px;border-radius:12px;cursor:pointer;font-size:11px;border:1px solid var(--line);background:${dbFiltroGens.has(g)?'var(--signal,#3b82f6)':'var(--panel)'};color:${dbFiltroGens.has(g)?'#fff':'inherit'}\">${g}<\u002Fbutton>`).join(' ');\n}\nwindow.dbToggleGen=function(g){\n  if(dbFiltroGens.has(g)) dbFiltroGens.delete(g); else dbFiltroGens.add(g);\n  dbGensRender(); dbResumen(); dbRender();\n};\nlet dbFiltroSel=null, dbGrupos=[], dbVerFicha=false;\nwindow.dbToggleFicha=function(){\n  dbVerFicha=!dbVerFicha;\n  const b=document.getElementById('db-ficha-btn');\n  if(b) b.textContent=dbVerFicha?'Ocultar ficha técnica':'Mostrar ficha técnica';\n  dbRender();\n};\nfunction dbResumen(){\n  const cont=document.getElementById(\"db-resumen\"); if(!cont) return;\n  if(!dbKey){cont.innerHTML=\"\";return;}\n  let rows=DEPU[dbKey];\n  if(dbFiltroGens.size) rows=rows.filter(r=>dbFiltroGens.has(r[1]||\"—\"));\n  const con={}, sin={};\n  rows.forEach(r=>{\n    const gen=r[1]||\"—\";\n    if(r[4]){ const k=gen+\"||\"+r[4]; const g=(con[k]=con[k]||{gen,ver:r[4],n:0,campo:4,val:r[4],ids:[],crudas:{},a0:9999,a1:0,fid:null});\n      g.n++; g.ids.push(r[0]); const cx=(r[3]||\"(sin texto)\"); g.crudas[cx]=(g.crudas[cx]||0)+1;\n      if(r[2]){g.a0=Math.min(g.a0,r[2]);g.a1=Math.max(g.a1,r[2]);}\n      if(r[6]){g.p0=Math.min(g.p0||1e12,r[6]);g.p1=Math.max(g.p1||0,r[6]);}\n      if(!g.fid && FICHAS[r[0]]) g.fid=r[0]; }\n    else { const tx=(r[3]||\"(sin texto)\"); const k=gen+\"||\"+tx; const g=(sin[k]=sin[k]||{gen,tx,n:0,ids:[],a0:9999,a1:0,fid:null});\n      g.n++; g.ids.push(r[0]);\n      if(r[2]){g.a0=Math.min(g.a0,r[2]);g.a1=Math.max(g.a1,r[2]);}\n      if(r[6]){g.p0=Math.min(g.p0||1e12,r[6]);g.p1=Math.max(g.p1||0,r[6]);}\n      if(!g.fid && FICHAS[r[0]]) g.fid=r[0]; }\n  });\n  const conArr=Object.values(con).sort((a,b)=>a.gen.localeCompare(b.gen)||b.n-a.n);\n  const sinArr=Object.values(sin).sort((a,b)=>a.gen.localeCompare(b.gen)||b.n-a.n);\n  let idx=0, prevGen=null;\n  const sinRows=sinArr.map(s=>{\n    if(s.gen!==prevGen){idx=0;prevGen=s.gen;}\n    idx++;\n    return {gen:s.gen, ver:\"sin determinar \"+idx, txt:s.tx, n:s.n, campo:3, val:s.tx, ids:s.ids, a0:s.a0, a1:s.a1, fid:s.fid, p0:s.p0, p1:s.p1};\n  });\n  dbGrupos=conArr.concat(sinRows);\n  const fila=(g,i)=>{\n    const sel=dbFiltroSel && dbFiltroSel.val===g.val && dbFiltroSel.campo===g.campo;\n    const esSin=g.campo===3;\n    let cruda=\"\";\n    if(esSin) cruda=esc((g.txt||\"\").slice(0,30));\n    else { const cs=Object.entries(g.crudas||{}).sort((a,b)=>b[1]-a[1]);\n      cruda=cs.length?esc(cs[0][0].slice(0,30))+(cs.length>1?\" (+\"+(cs.length-1)+\")\":\"\"):\"\"; }\n    return `<tr style=\"border-top:1px solid var(--line);cursor:pointer;${sel?\"background:rgba(59,130,246,.10)\":\"\"}\" onclick=\"dbSelGrupo(${i})\">\n      <td style=\"padding:4px 8px;white-space:nowrap\">${g.gen}<\u002Ftd>\n      <td style=\"padding:4px 8px;color:var(--muted);font-size:11px\">${cruda}<\u002Ftd>\n      <td style=\"padding:4px 8px;${esSin?\"color:var(--warn,#c0392b)\":\"color:var(--signal,#3b82f6)\"}\">${g.ver}<\u002Ftd>\n      <td style=\"padding:4px 8px;white-space:nowrap;color:var(--muted)\">${g.a0<9999?(g.a0===g.a1?g.a0:g.a0+\"–\"+g.a1):\"—\"}<\u002Ftd>\n      <td style=\"padding:4px 8px;white-space:nowrap;color:var(--muted)\">${g.p0?(\"$\"+(g.p0/1e6).toFixed(1)+\"–\"+(g.p1/1e6).toFixed(1)+\"M\"):\"—\"}<\u002Ftd>\n      <td style=\"padding:4px 8px\" class=\"num\"><b>${g.n}<\u002Fb><\u002Ftd>\n      <td style=\"padding:4px 8px\" class=\"num\" style=\"color:var(--muted)\">${(()=>{const tg=dbGrupos.filter(x=>x.gen===g.gen).reduce((a,x)=>a+x.n,0);return tg?Math.round(g.n*100/tg)+\"%\":\"—\";})()}<\u002Ftd>\n      <td style=\"padding:4px 8px\">${g.fid?`<button title=\"Ver la ficha técnica completa de un aviso de este grupo\" onclick=\"event.stopPropagation();verFicha('${g.fid}')\" style=\"border:none;background:none;cursor:pointer\">ficha<\u002Fbutton>`:\"\"}<\u002Ftd>\n      <td style=\"padding:4px 8px\"><button title=\"Corregir la versión de TODOS los avisos de este grupo\" onclick=\"event.stopPropagation();dbEditarGrupo(${i},this)\" style=\"border:none;background:none;cursor:pointer\">editar<\u002Fbutton><\u002Ftd><\u002Ftr>`;\n  };\n  cont.innerHTML=`<details open style=\"border:1px solid var(--line);border-radius:10px;padding:8px 12px;background:var(--panel)\">\n    <summary style=\"cursor:pointer;font-size:13px;font-weight:600\">Resumen por generación y versión (click en una fila para filtrar la tabla)<\u002Fsummary>\n    <table style=\"width:100%;border-collapse:collapse;font-size:12px;margin-top:6px\">\n      <thead><tr style=\"text-align:left;color:var(--muted);font-size:11px\">\n        <th style=\"padding:4px 8px\">Gen<\u002Fth><th style=\"padding:4px 8px\">Versión (vendedor)<\u002Fth>\n        <th style=\"padding:4px 8px\">Versión ajustada<\u002Fth>\n        <th style=\"padding:4px 8px\">Años<\u002Fth>\n        <th style=\"padding:4px 8px\">Precio<\u002Fth>\n        <th style=\"padding:4px 8px\" class=\"num\">Avisos<\u002Fth><th style=\"padding:4px 8px\" class=\"num\" title=\"Peso de esta versión dentro de su generación\">%<\u002Fth><th title=\"Ficha técnica de referencia\">ficha<\u002Fth><th><\u002Fth><\u002Ftr><\u002Fthead>\n      <tbody>${dbGrupos.map((g,i)=>fila(g,i)).join(\"\")}<\u002Ftbody><\u002Ftable>\n    ${dbFiltroSel?`<div style=\"margin-top:6px\"><button onclick=\"dbSelGrupo(-1)\" style=\"padding:3px 10px;border-radius:12px;border:1px solid var(--line);background:transparent;cursor:pointer;font-size:11px;color:var(--warn,#c0392b)\">quitar filtro de grupo<\u002Fbutton><\u002Fdiv>`:\"\"}\n  <\u002Fdetails>`;\n}\nwindow.verFicha=function(id){\n  const f=FICHAS[id]; if(!f) return;\n  const ov=document.createElement('div');\n  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;display:flex;align-items:center;justify-content:center';\n  const box=document.createElement('div');\n  box.style.cssText='background:var(--bg,#fff);border-radius:14px;padding:20px;max-width:900px;width:94%;max-height:88vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)';\n  const filas=Object.entries(f).sort((a,b)=>a[0].localeCompare(b[0]
